<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 后端地址：EdgeOne 边缘函数与静态站同域运行，留空则自动使用当前域名（location.origin） -->
<meta name="ght-api" content="">
<title>GHT 大喜马拉雅高线徒步追踪</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="nepal-provinces.js"></script>
  <script src="sections-data.js"></script>
<link rel="stylesheet" href="styles.css" />
</head>

<body>

<div class="app">

  <!-- ── TOP NAV ── -->
  <header class="topnav">
    <div class="brand">
      <svg class="brand-logo" width="22" height="22" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
        <defs>
          <linearGradient id="ghtBrandGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#79c0ff"/>
            <stop offset="1" stop-color="#1f6feb"/>
          </linearGradient>
        </defs>
        <path d="M2 24 L9 14 L15 21 L21 11 L30 24 Z" fill="#27406b"/>
        <path d="M5 26 L14 8 L20 19 L26 13 L30 26 Z" fill="url(#ghtBrandGrad)"/>
        <path d="M14 8 L18 15 L10 15 Z" fill="#eaf2ff"/>
        <path d="M9 26 C13 21 16 19 14 15 C12 12 17 11 20 8" stroke="#f0883e" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      </svg>
      GHT <span class="sub">大喜马拉雅高线 · GREAT HIMALAYA TRAIL</span>
    </div>
    <nav class="topnav-tabs" aria-label="主导航">
      <button class="tn-tab active" data-view="dashboard">Dashboard</button>
      <a class="tn-ext" id="navItinerary" href="itinerary.html" target="_blank" rel="noopener" title="计划 vs 实际 · 行程对比 →">📅 行程对比 ↗</a>
      <a class="tn-ext" id="navSections" href="sections.html" target="_blank" rel="noopener" title="路段进度 · 按 已完成/进行中/未完成 分组 →">🏔️ 路段 ↗</a>
      <a class="tn-ext" id="navJournal" href="journal.html" target="_blank" rel="noopener" title="远征日志 · 按路段分组 →">📝 日志 ↗</a>
    </nav>
    <div class="topnav-right">
      <button class="lang-btn">Language ▾</button>
    </div>
  </header>

  <!-- ── DASH GRID ── -->
  <div class="dash-grid">

    <!-- LEFT COLUMN -->
    <aside class="col-left">
      <section class="card" id="cardProgress"></section>
      <section class="card" id="cardStatus"></section>
      <section class="card" id="cardToday"></section>
    </aside>

    <!-- CENTER -->
    <main class="col-center">
      <div class="map-wrap">
        <div id="map"></div>
        <div class="map-overlay pos-badge" id="currentPosBadge">
          📍 当前位置: <span class="prov-name">--</span><span class="prov-elev"></span>
        </div>
        <div class="map-overlay map-compass" title="正北方向 N">
          <svg viewBox="0 0 40 40" width="22" height="22" aria-hidden="true">
            <circle cx="20" cy="20" r="18.5" fill="rgba(13,18,25,0.0)" stroke="rgba(230,237,243,0.30)" stroke-width="1.5"/>
            <polygon points="20,5 23.5,20 20,16.5 16.5,20" fill="#f85149"/>
            <polygon points="20,35 16.5,20 20,23.5 23.5,20" fill="#8b949e"/>
            <text x="20" y="14" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">N</text>
          </svg>
        </div>
        <div class="map-overlay map-legend" aria-label="图例">
          <div class="lg-row"><span class="lg-sw lg-cyan"></span>实际徒步轨迹</div>
          <div class="lg-row"><span class="lg-sw lg-plan"></span>计划路线 · 目标</div>
        </div>
        <div class="map-overlay region-info" id="regionInfo" hidden></div>
      </div>
      <div class="elevation-panel" id="elevationPanel">
        <div class="elevation-header">
          <span>📈 海拔剖面 · 预设轨迹 · <span id="elevLabel">--</span></span>
        </div>
        <div class="elevation-body" id="elevationBody"></div>
      </div>
    </main>

    <!-- RIGHT COLUMN -->
    <aside class="col-right">
      <section class="card" id="cardPasses"></section>
    </aside>

  </div>

  <!-- ── BOTTOM STATUS BAR ── -->
  <footer class="statusbar">
    <span>© 2026 GHT 高线追踪</span>
    <span class="live-dot" id="liveDot">🟢 Live Tracking Active · 实时追踪中</span>
    <span class="spacer"></span>
    <span>数据来源: GPX</span>
    <span>底图: © OpenStreetMap · Esri · OpenTopoMap</span>
  </footer>

</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-card">
    <div class="spinner"></div>
    <div style="font-size:13px;">正在解析 GPX 轨迹...</div>
  </div>
</div>

<script src="ght-region-map.js?v=3"></script>
<script src="app.js?v=4"></script>

</body>
</html>
