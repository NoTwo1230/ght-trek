# GHT 前台部署配置（Netlify，纯静态）
# 后端改用 Supabase（免卡），无需本仓库携带任何服务端文件

[build]
  publish = "."

# 部署入口指向带后端的页面（本地文件名为 index-notwo.html）
[[redirects]]
  from = "/"
  to = "/index-notwo.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
