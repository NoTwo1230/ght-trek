<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>GHT 云端 vs 本机 数据对比</title>
<style>
  body { font-family: 'Noto Sans SC',system-ui,sans-serif; background:#0d1117; color:#e6edf3; padding:20px; max-width:1100px; margin:auto; }
  h1 { font-size:20px; border-bottom:1px solid #30363d; padding-bottom:8px; }
  h2 { font-size:16px; color:#58a6ff; margin:18px 0 8px; }
  .box { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:14px; margin:10px 0; }
  .row { display:flex; gap:12px; flex-wrap:wrap; }
  .col { flex:1; min-width:300px; }
  .ok { color:#3fb950; }
  .warn { color:#d29922; }
  .err { color:#f85149; }
  .dim { color:#8b949e; font-size:12px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; color:#8b949e; border-bottom:1px solid #30363d; padding:4px 8px; }
  td { padding:4px 8px; border-bottom:1px solid #21262d; vertical-align:top; word-break:break-all; }
  .diff { background:rgba(248,81,73,0.12); }
  .same { color:#3fb950; }
  pre { background:#0d1117; padding:10px; border-radius:6px; overflow:auto; max-height:300px; font-size:11px; white-space:pre-wrap; }
  .loading { color:#d29922; }
  .badge { display:inline-block; padding:1px 8px; border-radius:10px; font-size:11px; }
  .badge-ok { background:rgba(63,185,80,0.15); color:#3fb950; }
  .badge-err { background:rgba(248,81,73,0.15); color:#f85149; }
  .badge-warn { background:rgba(210,153,34,0.15); color:#d29922; }
</style>
</head>
<body>
<h1>🔍 GHT 云端 vs 本机 数据对比诊断</h1>
<div class="dim" id="meta"></div>

<div class="row">
  <div class="col">
    <div class="box">
      <h2>☁️ 云端数据 <span id="cloudSt" class="badge badge-warn">加载中...</span></h2>
      <div id="cloud">...</div>
    </div>
  </div>
  <div class="col">
    <div class="box">
      <h2>💻 本机 localStorage</h2>
      <div id="local">...</div>
    </div>
  </div>
</div>

<div class="box">
  <h2>⚡ 逐项对比</h2>
  <div id="compare">...</div>
</div>

<div class="box">
  <h2>📋 云端 /api/config</h2>
  <div id="configArea">...</div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;') : '';

$('meta').innerHTML = 'origin: <b>'+location.origin+'</b> · url: '+location.href+' · time: '+new Date().toLocaleString();

// ── 收集本机 localStorage 所有 ght_ 键 ──
function collectLocal(){
  const keys=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.indexOf('ght_')===0) keys.push(k);
  }
  keys.sort();
  const out={};
  keys.forEach(k=>{
    try{ out[k]=JSON.parse(localStorage.getItem(k)); }catch(e){ out[k]=localStorage.getItem(k); }
  });
  return out;
}

function sizeOf(v){
  if(!v) return 0;
  return JSON.stringify(v).length;
}

function summarize(data){
  if(!data) return '(空/null)';
  if(Array.isArray(data)) return '数组['+data.length+'] '+sizeOf(data)+'字节';
  if(typeof data==='object'){
    const keys=Object.keys(data);
    return '对象{'+keys.length+'键} ['+keys.slice(0,8).join(',')+(keys.length>8?',...':'')+'] '+sizeOf(data)+'字节';
  }
  return typeof data+'='+sizeOf(data)+'字节';
}

// ── 日志时间线渲染 ──
function fmtTs(ts){
  if(!ts) return '未知时间';
  const d = (ts>1e12) ? new Date(ts) : new Date(ts*1000); // 兼容秒/毫秒
  if(isNaN(d.getTime())) return String(ts);
  const p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes());
}
function renderJournalTimeline(journal){
  if(!Array.isArray(journal)||!journal.length) return '<p class="dim">（空）</p>';
  const rows = journal.slice().sort((a,b)=>(b.updatedAt||b.createdAt||0)-(a.updatedAt||a.createdAt||0));
  let html='<table style="margin-top:6px"><tr><th>时间(updatedAt)</th><th>类型</th><th>内容</th></tr>';
  rows.forEach(e=>{
    const ts = e.updatedAt||e.createdAt;
    const kind = e.kind||e.type||'';
    const title = e.title||e.text||e.msg||e.content||JSON.stringify(e).slice(0,60);
    const isAdmin = /清空云端|重新发布|重置/.test(title||'') || /admin/.test(kind||'');
    const cls = isAdmin ? 'diff' : '';
    html+='<tr class="'+cls+'"><td>'+fmtTs(ts)+'</td><td>'+(kind||'—')+'</td><td>'+esc(String(title))+'</td></tr>';
  });
  html+='</table>';
  return html;
}
// 本机 ght_log 时间线
function renderLocalLogTimeline(){
  const log = localData['ght_log'];
  if(!log) return '';
  return '<details style="margin-top:6px"><summary style="cursor:pointer;color:#58a6ff">💻 本机 ght_log 时间线 ('+log.length+'条)</summary>'+renderJournalTimeline(log)+'</details>';
}

// ── 渲染本地数据 ──
const localData=collectLocal();
let lh='<table><tr><th>键</th><th>摘要</th><th>大小</th></tr>';
Object.keys(localData).sort().forEach(k=>{
  const v=localData[k];
  const sz=sizeOf(v);
  lh+='<tr><td>'+esc(k)+'</td><td>'+esc(summarize(v))+'</td><td>'+sz+'B</td></tr>';
});
lh+='</table>';
lh+=renderLocalLogTimeline();
$('local').innerHTML=lh;

// ── 拉取云端数据 ──
Promise.all([
  fetch('/api/share').then(r=>r.ok?r.json():{error:'HTTP'+r.status}).catch(e=>({error:e.message})),
  fetch('/api/config').then(r=>r.ok?r.json():{error:'HTTP'+r.status}).catch(e=>({error:e.message}))
]).then(([shareResp, configResp])=>{
  // 云端 share
  const cloudData = shareResp && shareResp.ok ? shareResp.data : null;
  let ch='';
  if(shareResp.error){
    ch='<p class="err">❌ /api/share 请求失败: '+esc(shareResp.error)+'</p>';
    $('cloudSt').className='badge badge-err';
    $('cloudSt').textContent='失败';
  } else if(!cloudData){
    ch='<p class="warn">☁️ 云端共享包为空（从未推送过或已清空）</p>';
    $('cloudSt').className='badge badge-warn';
    $('cloudSt').textContent='空';
  } else {
    $('cloudSt').className='badge badge-ok';
    $('cloudSt').textContent='正常';
    ch='<table><tr><th>字段</th><th>摘要</th><th>大小</th></tr>';
    Object.keys(cloudData).sort().forEach(k=>{
      const v=cloudData[k];
      ch+='<tr><td>'+esc(k)+'</td><td>'+esc(summarize(v))+'</td><td>'+sizeOf(v)+'B</td></tr>';
    });
    ch+='</table>';
    
    // 展开关键字段
    if(cloudData.itinerary){
      ch+='<details open><summary style="cursor:pointer;color:#58a6ff;margin-top:8px">📅 itinerary ('+cloudData.itinerary.length+'天)</summary>';
      ch+='<pre>'+esc(JSON.stringify(cloudData.itinerary.slice(0,3),null,2))+(cloudData.itinerary.length>3?'\n... 共'+cloudData.itinerary.length+'天':'')+'</pre></details>';
    }
    if(cloudData.itineraryStart||cloudData.itineraryStartDate){
      const is=cloudData.itineraryStart||cloudData.itineraryStartDate;
      ch+='<p style="margin-top:4px">📆 出发日期(云端): <b>'+esc(is)+'</b></p>';
    }
    if(cloudData.journal){
      ch+='<details open><summary style="cursor:pointer;color:#58a6ff;margin-top:4px">📝 云端 journal 时间线 ('+((cloudData.journal&&cloudData.journal.length)||0)+'条，按时间排序)</summary>';
      ch+=renderJournalTimeline(cloudData.journal);
      ch+='</details>';
    }
  }
  $('cloud').innerHTML=ch;

  // config
  let cfgHtml='';
  if(configResp.error){
    cfgHtml='<p class="err">❌ /api/config 失败: '+esc(configResp.error)+'</p>';
  } else {
    cfgHtml='<pre>'+esc(JSON.stringify(configResp,null,2))+'</pre>';
    // 检查出发日期
    if(configResp.itineraryStartDate||configResp.itineraryStart){
      const cs=configResp.itineraryStartDate||configResp.itineraryStart;
      cfgHtml+='<p>📆 config出发日期: <b class="ok">'+esc(cs)+'</b></p>';
    }
  }
  $('configArea').innerHTML=cfgHtml;

  // ── 对比（带 ght_ 前缀 ↔ 云端裸名 映射）──
  // 云端共享包用裸名（itinerary/preset/...），本机 localStorage 用 ght_ 前缀（ght_itinerary/...），
  // 且部分键有重命名（ght_log↔journal、ght_current_pos↔pos、ght_itinerary_start↔itineraryStart）。
  const KEY_MAP = {
    'ght_itinerary': 'itinerary',
    'ght_itinerary_start': 'itineraryStart',
    'ght_preset': 'preset',
    'ght_preset_segments': 'segments',
    'ght_actual': 'actual',
    'ght_current_pos': 'pos',
    'ght_rest_days': 'restDays',
    'ght_sections': 'sections',
    'ght_total_distance': 'totalDistance',
    'ght_log': 'journal'
  };
  const cloudKeys = cloudData ? Object.keys(cloudData) : [];
  const localMapped = {};   // mappedKey -> localVal
  Object.keys(localData).forEach(k=>{
    const mk = KEY_MAP[k] || (k.indexOf('ght_')===0 ? k.slice(4) : k);
    localMapped[mk] = localData[k];
  });

  let cmp='<table>';
  cmp+='<tr><th>字段</th><th>本机</th><th>云端</th><th>状态</th></tr>';

  const union=new Set([...Object.keys(localMapped), ...cloudKeys]);
  let consistent=0, diffCount=0, onlyLocal=0, onlyCloud=0;
  union.forEach(mk=>{
    const localVal=localMapped[mk];
    const cloudVal=cloudData?cloudData[mk]:undefined;
    const localSum=summarize(localVal);
    const cloudSum=summarize(cloudVal);

    let status=''; let cls='';
    if(localVal===undefined){
      status='⚠️ 仅云端有'; cls='diff'; onlyCloud++;
    } else if(cloudVal===undefined){
      status='⚠️ 仅本机有(正常)'; cls=''; onlyLocal++;
    } else {
      const ls=JSON.stringify(localVal);
      const cs=JSON.stringify(cloudVal);
      if(ls===cs){ status='✅ 完全一致'; cls='same'; consistent++; }
      else {
        // 字节数接近则视为"内容一致但精度/抽稀差异"
        const lb=JSON.stringify(localVal).length, cb=JSON.stringify(cloudVal).length;
        if(Math.abs(lb-cb) < Math.max(lb,cb)*0.05){
          status='🟡 基本一致(抽稀/精度差异)'; cls=''; consistent++;
        } else {
          status='❌ 内容不一致'; cls='diff'; diffCount++;
        }
      }
    }

    cmp+='<tr class="'+cls+'">';
    cmp+='<td><b>'+esc(mk)+'</b></td>';
    cmp+='<td>'+esc(localSum)+'</td>';
    cmp+='<td>'+esc(cloudSum)+'</td>';
    cmp+='<td>'+status+'</td>';
    cmp+='</tr>';
  });
  cmp='<div class="box" style="margin-bottom:8px">'+
    '<b>结论：</b>完全一致 '+consistent+' 项 · 内容不一致 '+diffCount+' 项 · 仅云端 '+onlyCloud+' 项 · 仅本机(正常) '+onlyLocal+' 项'+
    '</div>'+cmp;
  $('compare').innerHTML=cmp;
});
</script>
</body>
</html>
