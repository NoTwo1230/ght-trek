<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 790" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ar" markerWidth="11" markerHeight="11" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#58a6ff"/>
    </marker>
    <marker id="al" markerWidth="11" markerHeight="11" refX="2" refY="5" orient="auto">
      <path d="M10,0 L0,5 L10,10 Z" fill="#d29922"/>
    </marker>
  </defs>

  <rect width="860" height="790" fill="#0d1117"/>
  <text x="430" y="34" fill="#f0f6fc" font-size="19" font-weight="700" text-anchor="middle">GHT 跨设备同步时序图</text>
  <text x="430" y="56" fill="#8b949e" font-size="13" text-anchor="middle">A 清空云端  →  A 重新发布共享  →  B 打开页面</text>

  <!-- lifelines -->
  <line x1="150" y1="115" x2="150" y2="735" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="430" y1="115" x2="430" y2="735" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="710" y1="115" x2="710" y2="735" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- participants -->
  <rect x="90" y="82" width="120" height="34" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="150" y="104" fill="#c9d1d9" font-size="13" font-weight="600" text-anchor="middle">电脑 A（主人）</text>
  <rect x="350" y="82" width="160" height="34" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="430" y="104" fill="#c9d1d9" font-size="13" font-weight="600" text-anchor="middle">云端共享包（单一）</text>
  <rect x="650" y="82" width="120" height="34" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="710" y="104" fill="#c9d1d9" font-size="13" font-weight="600" text-anchor="middle">电脑 B（主人）</text>

  <!-- 1: A -> Cloud 清空 -->
  <line x1="160" y1="150" x2="420" y2="150" stroke="#58a6ff" stroke-width="2" marker-end="url(#ar)"/>
  <text x="290" y="143" fill="#c9d1d9" font-size="12.5" text-anchor="middle">① 清空云端  purgeCloudShare（置空 + clearedAt）</text>

  <!-- A self note -->
  <rect x="20" y="170" width="260" height="34" rx="6" fill="#21262d" stroke="#30363d"/>
  <text x="150" y="192" fill="#d29922" font-size="11.5" text-anchor="middle">本机设 ght_cleared_self（暂停自动回推）</text>

  <!-- 2: A -> Cloud 重新发布 -->
  <line x1="160" y1="228" x2="420" y2="228" stroke="#58a6ff" stroke-width="2" marker-end="url(#ar)"/>
  <text x="290" y="221" fill="#c9d1d9" font-size="12.5" text-anchor="middle">② 重新发布共享（移除标记 + pushShare）</text>

  <!-- Cloud self: 云端=A数据 -->
  <rect x="300" y="252" width="260" height="34" rx="6" fill="#21262d" stroke="#30363d"/>
  <text x="430" y="274" fill="#79c0ff" font-size="12" text-anchor="middle">云端 = A 的全部数据（路线/日志/轨迹）</text>

  <!-- 3: B -> Cloud loadShared -->
  <line x1="700" y1="318" x2="440" y2="318" stroke="#58a6ff" stroke-width="2" marker-end="url(#al)"/>
  <text x="570" y="311" fill="#c9d1d9" font-size="12.5" text-anchor="middle">③ B 打开页面 → loadShared() 自动执行</text>

  <!-- 4: Cloud -> B 覆盖 preset/行程 -->
  <line x1="440" y1="360" x2="700" y2="360" stroke="#d29922" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ar)"/>
  <text x="570" y="353" fill="#d29922" font-size="12.5" text-anchor="middle">④ 拉取 A 数据：preset / 行程 被 A 的覆盖（云端优先）</text>

  <!-- 5: Cloud -> B 合并日志/轨迹 -->
  <line x1="440" y1="400" x2="700" y2="400" stroke="#d29922" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ar)"/>
  <text x="570" y="393" fill="#d29922" font-size="12.5" text-anchor="middle">⑤ 日志 / 实际轨迹 按 id 合并（B 独有保留）</text>

  <!-- 6: B -> Cloud 回推 -->
  <line x1="700" y1="440" x2="440" y2="440" stroke="#58a6ff" stroke-width="2" marker-end="url(#al)"/>
  <text x="570" y="433" fill="#c9d1d9" font-size="12.5" text-anchor="middle">⑥ 自动 pushShare 回推（合并后的本地）</text>

  <!-- Cloud self: 最终 -->
  <rect x="280" y="464" width="300" height="34" rx="6" fill="#21262d" stroke="#30363d"/>
  <text x="430" y="486" fill="#79c0ff" font-size="12" text-anchor="middle">云端 = A 路线 + (A ∪ B) 日志 / 轨迹</text>

  <!-- summary -->
  <rect x="40" y="548" width="780" height="190" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="60" y="578" fill="#f0f6fc" font-size="14" font-weight="700">关键语义</text>
  <circle cx="66" cy="606" r="3" fill="#58a6ff"/>
  <text x="80" y="611" fill="#c9d1d9" font-size="12.5">云端是单一共享包，不按设备分开；最后推上去的那份就是云端。</text>
  <circle cx="66" cy="634" r="3" fill="#58a6ff"/>
  <text x="80" y="639" fill="#c9d1d9" font-size="12.5">preset / 行程 / 分段：云端优先，拉取时无条件覆盖本机。</text>
  <circle cx="66" cy="662" r="3" fill="#58a6ff"/>
  <text x="80" y="667" fill="#c9d1d9" font-size="12.5">日志 / 实际轨迹：按 id 合并，本机独有者保留。</text>
  <circle cx="66" cy="690" r="3" fill="#58a6ff"/>
  <text x="80" y="695" fill="#c9d1d9" font-size="12.5">ght_cleared_self 仅本机标记，不跨设备。</text>
  <circle cx="66" cy="718" r="3" fill="#f85149"/>
  <text x="80" y="723" fill="#c9d1d9" font-size="12.5">风险：A、B 数据分歧时，后打开者覆盖 preset / 行程。</text>
</svg>
