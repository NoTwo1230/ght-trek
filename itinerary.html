<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHT 行程日历 · 计划 vs 实际</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap">
<style>
  :root {
    /* ── 与主 app 完全一致的 Adventure Dark Palette ── */
    --bg: #0a0e14;
    --panel: #0d1219;
    --panel-alt: #161b22;
    --panel-bg: rgba(13,18,25,0.95);
    --border: #1c2333;
    --border-light: #21262d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-dimmer: #7d8590;
    --accent: #58a6ff;
    --accent-bg: #1a3a5c;
    --accent2: #f0883e;
    --green: #3fb950;
    --red: #f85149;
    --red-deep: #b62324;
    --purple: #bc8cff;
    --yellow: #d29922;
    --cyan: #39d2c0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  :focus:not(:focus-visible) { outline: none; }

  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(88,166,255,0.08), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(63,185,80,0.06), transparent 60%),
      var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ── 顶部栏（吸顶 + 毛玻璃）── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px;
    background: rgba(10,14,20,0.82);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .topbar .title {
    font-size: 17px; font-weight: 700; letter-spacing: .3px;
    display: flex; align-items: center; gap: 9px; white-space: nowrap;
  }
  .topbar .title .glyph {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--accent-bg); border: 1px solid rgba(88,166,255,0.25);
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .topbar .title small { font-weight: 400; color: var(--text-dim); font-size: 12px; }

  .back-link {
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 6px;
    text-decoration: none; color: var(--text-dim);
    border: 1px solid var(--border-light); border-radius: 8px;
    padding: 7px 13px; font-size: 12px; transition: all .2s;
  }
  .back-link:hover { color: var(--text); border-color: var(--accent); background: rgba(88,166,255,0.08); }

  /* ── 摘要条 ── */
  .summary {
    padding: 16px 20px 6px;
  }
  .stat-row { display: flex; flex-wrap: wrap; gap: 10px; width: 100%; }
  .stat-row + .stat-row { margin-top: 10px; }
  .stat-group-label {
    width: 100%; font-size: 12px; font-weight: 600; color: var(--text-dim);
    letter-spacing: .04em; padding: 2px 2px 0;
  }
  .stat {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 11px 16px; min-width: 116px; flex: 1 1 auto;
  }
  .stat .v { font-size: 21px; font-weight: 700; line-height: 1.1; }
  .stat .v.green { color: var(--green); }
  .stat .v.blue { color: var(--accent); }
  .stat .v.amber { color: var(--yellow); }
  .stat .v.red { color: var(--red); }
  .stat .l { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  .slip-note {
    width: 100%;
    background: rgba(255,169,77,0.12); border: 1px solid rgba(255,169,77,0.35);
    color: #FFA94D; border-radius: 10px; padding: 9px 14px; font-size: 12px; line-height: 1.5;
  }

  /* ── 工具栏（位置基准 / 筛选）── */
  .toolbar {
    position: sticky; top: 59px; z-index: 90;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 12px 20px;
    background: rgba(10,14,20,0.78);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .toolbar .group { display: flex; align-items: center; gap: 6px; }
  .toolbar .glabel { font-size: 11px; color: var(--text-dim); margin-right: 2px; }
  .seg {
    display: inline-flex; background: var(--panel); border: 1px solid var(--border);
    border-radius: 9px; overflow: hidden;
  }
  .seg button {
    border: none; background: transparent; color: var(--text-dim);
    padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: inherit;
    transition: all .15s;
  }
  .seg button:hover { color: var(--text); }
  .seg button.active { background: var(--accent-bg); color: var(--accent); }
  .spacer { flex: 1; }
  .count-note { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  /* ── 日历 ── */
  .cal-wrap { padding: 14px 20px 60px; max-width: 1180px; margin: 0 auto; width: 100%; }
  .cal-head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
  .cal-nav { display: flex; align-items: center; gap: 8px; }
  .cal-nav button {
    width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--border);
    background: var(--panel); color: var(--text); font-size: 16px; cursor: pointer; transition: all .15s;
  }
  .cal-nav button:hover { border-color: var(--accent); color: var(--accent); }
  .cal-title { font-size: 18px; font-weight: 700; min-width: 140px; text-align: center; letter-spacing: .5px; }

  .legend {
    display: flex; flex-wrap: wrap; gap: 10px 16px; margin: 0 0 14px;
    padding: 10px 14px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; font-size: 11.5px; color: var(--text-dim);
  }
  .legend .item { display: flex; align-items: center; gap: 6px; }
  .legend .dot { width: 9px; height: 9px; border-radius: 50%; }
  .legend .bar { width: 16px; height: 4px; border-radius: 2px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 6px;
  }
  .wd { font-size: 11px; color: var(--text-dim); text-align: center; padding: 5px 2px; font-weight: 500; }
  .cell {
    position: relative; min-height: 100px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 10px; padding: 5px 6px;
    display: flex; flex-direction: column; gap: 4px; transition: border-color .15s;
    overflow: hidden;
  }
  .cell:hover { border-color: var(--border-light); }
  .cell.out { opacity: .28; background: transparent; border-color: transparent; }
  .cell.today { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(88,166,255,0.45); }
  .cell .dnum { font-size: 11px; color: var(--text-dim); font-weight: 600; }
  .cell.today .dnum { color: var(--accent); }

  /* 日历中的「天」块（按钮，可点/可键盘） */
  .chip {
    position: relative; display: flex; flex-direction: column; gap: 2px;
    width: 100%; text-align: left; font: inherit; color: var(--text);
    border: 1px solid var(--border-light); border-radius: 8px; padding: 5px 7px 6px 9px;
    background: var(--panel-alt); cursor: pointer; overflow: hidden;
    transition: transform .12s, border-color .15s, box-shadow .15s;
  }
  .chip:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,.35); border-color: var(--accent); }
  .chip .stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 2px 0 0 2px; }
  .chip .crow { display: flex; align-items: center; gap: 5px; }
  .chip .dlab { font-size: 10.5px; font-weight: 700; }
  .chip .sdot { width: 7px; height: 7px; border-radius: 50%; margin-left: auto; flex-shrink: 0; }
  .chip .route { font-size: 10px; color: var(--text-dim); line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chip .route .ar { color: var(--accent); margin: 0 2px; }
  .chip .meta { display: flex; gap: 6px; font-size: 9px; color: var(--text-dimmer); }
  .chip .meta .rname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip .badge { margin-left: auto; background: var(--accent-bg); color: var(--accent); font-size: 8.5px; font-weight: 700; border-radius: 8px; padding: 1px 5px; }
  .chip .ghost { font-size: 8.5px; color: var(--text-dimmer); }
  .chip.is-rest { background: rgba(63,185,80,.08); border-color: rgba(63,185,80,.25); }
  .chip.is-delay { background: rgba(210,153,34,.08); border-color: rgba(210,153,34,.25); }

  /* ── 详情抽屉 ── */
  .scrim {
    position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 200;
    opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100%; width: 460px; max-width: 92vw;
    background: var(--panel-bg); border-left: 1px solid var(--border-light); z-index: 210;
    transform: translateX(100%); transition: transform .3s cubic-bezier(.16,1,.3,1);
    display: flex; flex-direction: column; box-shadow: -20px 0 60px rgba(0,0,0,.5);
  }
  .drawer.open { transform: translateX(0); }
  .drawer .dhead { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .drawer .dhead .num { font-size: 15px; font-weight: 700; }
  .drawer .dclose {
    margin-left: auto; width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--panel); color: var(--text-dim); cursor: pointer; font-size: 16px;
  }
  .drawer .dclose:hover { color: var(--text); border-color: var(--accent); }
  .drawer .dbody { padding: 16px 18px 40px; overflow-y: auto; }
  .dv-sep { border: none; border-top: 1px dashed var(--border); margin: 16px 0; }

  /* 抽屉内单天详情 */
  .dd-h { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
  .dd-sub { font-size: 12px; color: var(--text-dim); }
  .day-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--panel-alt); border: 1px solid var(--border-light);
    border-radius: 10px; padding: 5px 11px; font-weight: 700; font-size: 13px;
  }
  .day-badge .dot { width: 10px; height: 10px; border-radius: 50%; }
  .day-badge .num { color: var(--text); }
  .chip2 { font-size: 11px; padding: 3px 9px; border-radius: 20px; white-space: nowrap; border: 1px solid transparent; }
  .chip2.ahead { background: rgba(63,185,80,.15); color: var(--green); border-color: rgba(63,185,80,.35); }
  .chip2.behind { background: rgba(248,81,73,.15); color: var(--red); border-color: rgba(248,81,73,.35); }
  .chip2.ontime { background: rgba(88,166,255,.12); color: var(--accent); border-color: rgba(88,166,255,.3); }
  .chip2.rest { background: rgba(63,185,80,.12); color: var(--green); border-color: rgba(63,185,80,.3); }
  .chip2.delay { background: rgba(210,153,34,.14); color: var(--yellow); border-color: rgba(210,153,34,.32); }
  .chip2.wait { background: rgba(139,148,158,.12); color: var(--text-dim); border-color: rgba(139,148,158,.28); }

  /* ── 延误按钮（详情抽屉头部）── */
  .dd-delay { margin-left: auto; display: inline-flex; gap: 4px; align-items: center; }
  .dd-dbtn {
    background: none; border: 1px solid var(--border-light);
    color: var(--text-dim); cursor: pointer;
    font-size: 14px; padding: 3px 6px; border-radius: 6px;
    line-height: 1; transition: all .15s;
  }
  .dd-dbtn:hover { color: #FFA94D; border-color: rgba(255,169,77,.5); background: rgba(255,169,77,.08); }
  .dd-dbtn.on { color: #FFA94D; border-color: rgba(255,169,77,.5); background: rgba(255,169,77,.18); }

  /* 计划 / 实际 双栏（抽屉内） */
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 12px; }
  .col { border-radius: 11px; padding: 12px 14px; border: 1px solid transparent; }
  .col.plan { background: rgba(88,166,255,.05); border-color: rgba(88,166,255,.14); }
  .col.actual { background: rgba(63,185,80,.05); border-color: rgba(63,185,80,.14); }
  .col-title { font-size: 11px; font-weight: 700; letter-spacing: .4px; margin-bottom: 9px; display: flex; align-items: center; gap: 6px; }
  .col.plan .col-title { color: var(--accent); }
  .col.actual .col-title { color: var(--green); }
  .row { display: flex; align-items: baseline; gap: 8px; padding: 3px 0; font-size: 12.5px; }
  .row .k { color: var(--text-dim); min-width: 48px; flex-shrink: 0; font-size: 11.5px; }
  .row .v { color: var(--text); }
  .row .v.plan { color: var(--text-dim); }
  .route { font-size: 12.5px; color: var(--text); line-height: 1.5; }
  .route .arrow { color: var(--accent); margin: 0 5px; }
  .passes { margin-top: 6px; font-size: 11px; color: var(--text-dim); line-height: 1.6; }
  .passes .tag { color: var(--purple); }
  .mismatch { margin-top: 8px; font-size: 11px; color: var(--red); background: rgba(248,81,73,.1); border: 1px solid rgba(248,81,73,.28); border-radius: 7px; padding: 6px 9px; line-height: 1.5; }
  .pending { color: var(--text-dim); font-style: italic; font-size: 12px; }

  /* 对比条 */
  .cmp { margin-top: 14px; border-top: 1px dashed var(--border); padding-top: 12px; }
  .cmp-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .cmp-head .lbl { font-size: 11px; color: var(--text-dim); }
  .cmp-head .delta { font-size: 12px; font-weight: 600; }
  .cmp-head .delta.green { color: var(--green); }
  .cmp-head .delta.red { color: var(--red); }
  .cmp-head .delta.dim { color: var(--text-dim); }
  .bars { display: flex; flex-direction: column; gap: 6px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-row .bl { font-size: 10.5px; color: var(--text-dim); width: 34px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 9px; background: var(--panel-alt); border-radius: 6px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width .4s ease; }
  .bar-fill.plan { background: linear-gradient(90deg, var(--accent), #79b8ff); }
  .bar-fill.actual { background: linear-gradient(90deg, var(--green), #56d364); }
  .bar-row .bv { font-size: 11px; color: var(--text); width: 64px; text-align: right; flex-shrink: 0; }

  /* 空状态 */
  .empty { max-width: 520px; margin: 60px auto; text-align: center; color: var(--text-dim); padding: 0 20px; }
  .empty .ico { font-size: 54px; margin-bottom: 16px; }
  .empty h2 { color: var(--text); font-size: 17px; margin-bottom: 10px; font-weight: 600; }
  .empty p { font-size: 13px; line-height: 1.8; }
  .empty a { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(88,166,255,0.4); }
  .empty code { background: var(--panel-alt); padding: 1px 6px; border-radius: 5px; font-size: 12px; color: var(--cyan); }

  .foot-note { text-align: center; font-size: 11px; color: var(--text-dimmer); padding: 24px 20px 8px; line-height: 1.7; }

  /* ── 出发日期缺失提示横幅 ── */
  .date-warn {
    margin: 0 20px; padding: 10px 14px; border-radius: 10px;
    background: rgba(248,81,73,.12); border: 1px solid rgba(248,81,73,.35);
    color: #ff8a82; font-size: 12px; line-height: 1.6;
  }
  .date-warn a { color: #ff8a82; text-decoration: underline; }

  /* ═══ 响应式断点系统 ═══ */

  /* ── 大屏优化 (≥1200px)：宽松间距 ── */
  @media (min-width: 1200px) {
    .cal-wrap { padding: 18px 28px 60px; }
    .cell { min-height: 116px; padding: 7px 8px; }
    .chip { padding: 6px 9px 7px 12px; }
    .chip .dlab { font-size: 11.5px; }
    .chip .route { font-size: 10.5px; }
    .chip .meta { font-size: 10px; }
    .grid { gap: 8px; }
  }

  /* ── 平板横屏 (768–1023px)：适度紧凑 ── */
  @media (max-width: 1023px) and (min-width: 768px) {
    .cal-wrap { max-width: 100%; padding: 12px 16px 50px; }
    .cell { min-height: 92px; padding: 4px 5px; }
    .chip { padding: 4px 6px 5px 8px; }
    .chip .route { font-size: 9.5px; }
    .chip .meta { font-size: 8.5px; gap: 5px; }
    .chip .dlab { font-size: 10px; }
    .legend { font-size: 10.5px; gap: 8px 12px; padding: 8px 11px; }
    .drawer { width: 400px; }
  }

  /* ── 平板竖屏/大手机 (≤767px)：紧凑模式，隐藏次要信息 ── */
  @media (max-width: 767px) and (min-width: 481px) {
    .cols { grid-template-columns: 1fr; }
    .stat { min-width: calc(50% - 4px); padding: 9px 12px; }
    .stat .v { font-size: 18px; }
    .topbar .title small { display: none; }
    .topbar { padding: 11px 14px; gap: 10px; }
    .cal-title { min-width: 100px; font-size: 15px; }
    .cell { min-height: 82px; padding: 4px 5px; border-radius: 8px; }
    .chip { padding: 4px 6px 5px 8px; border-radius: 7px; }
    .chip .stripe { width: 3px; }
    .chip .dlab { font-size: 9.5px; }
    .chip .sdot { width: 6px; height: 6px; }
    .chip .route { font-size: 9px; }
    /* 隐藏区域名（次要），保留距离 */
    .chip .meta .rname { display: none; }
    .chip .meta { font-size: 8.5px; gap: 4px; }
    .chip .ghost { display: none; }
    .toolbar { padding: 10px 14px; gap: 8px; }
    .glabel { font-size: 10px; }
    .seg button { padding: 5px 10px; font-size: 11px; }
    .legend { font-size: 10px; gap: 6px 10px; padding: 8px 10px; flex-wrap: wrap; }
    .drawer { width: 100%; }
    .summary { padding: 12px 14px 4px; }
    .cal-head { margin-bottom: 10px; gap: 10px; }
  }

  /* ── 小手机 (≤480px)：极简模式，只保留核心信息 ── */
  @media (max-width: 480px) {
    html, body { font-size: 14px; } /* 缩小基准字号 */
    .cols { grid-template-columns: 1fr; gap: 10px; }
    .stat { min-width: calc(45% - 3px); padding: 8px 10px; }
    .stat .v { font-size: 17px; }
    .stat .l { font-size: 10px; }
    .topbar { padding: 10px 12px; gap: 8px; }
    .topbar .title { font-size: 15px; }
    .topbar .title small,
    .back-link span { display: none; }
    .back-link { padding: 6px 9px; font-size: 11px; }
    .summary { padding: 10px 12px 4px; }

    /* 工具栏：位置基准标签隐藏，按钮缩小 */
    .toolbar { padding: 8px 12px; gap: 6px; flex-wrap: wrap; }
    .glabel { display: none; }
    .seg button { padding: 5px 9px; font-size: 10.5px; }
    .count-note { font-size: 10px; }

    /* 日历网格：进一步压缩 */
    .cal-wrap { padding: 10px 10px 40px; }
    .cal-nav button { width: 30px; height: 30px; font-size: 14px; }
    .cal-title { font-size: 14px; min-width: 90px; }
    .grid { gap: 4px; }
    .wd { font-size: 10px; padding: 3px 0; }
    .cell { min-height: 70px; padding: 3px 4px; border-radius: 7px; border-color: var(--border); }
    .cell .dnum { font-size: 10px; }
    .cell.today { box-shadow: 0 0 0 1px rgba(88,166,255,0.4); }

    /* 芯片：极致精简 — 只保留 D号+状态+路线，隐藏距离和区域名 */
    .chip { padding: 3px 5px 4px 7px; border-radius: 6px; gap: 1px; }
    .chip .stripe { width: 3px; }
    .chip .crow { gap: 4px; }
    .chip .dlab { font-size: 9px; }
    .chip .sdot { width: 6px; height: 6px; }
    .chip .route { font-size: 8.5px; line-height: 1.25; }
    .chip .meta { display: none; }          /* 隐藏距离 + 区域名 */
    .chip .ghost { display: none; }
    .chip .badge { font-size: 8px; padding: 0 4px; }
    .chip:hover { transform: translateY(-1px); }

    /* 图例：折叠为单行 */
    .legend { font-size: 9px; gap: 5px 8px; padding: 6px 8px; }
    .legend .item { gap: 4px; }

    /* 抽屉：全屏滑入 */
    .drawer { width: 100vw; border-radius: 0; }
    .drawer .dhead { padding: 13px 14px 10px; }
    .drawer .dbody { padding: 13px 14px 30px; }
    .dclose { width: 28px; height: 28px; font-size: 18px; }
    .slip-note { font-size: 11px; padding: 7px 10px; }

    /* 摘要备注缩小 */
    .foot-note { font-size: 10px; padding: 18px 12px 6px; }
  }

  /* ── 超小屏 (≤360px) ── */
  @media (max-width: 360px) {
    .stat { min-width: calc(42% - 2px); padding: 7px 8px; }

<!-- 13 区域配色（与首页/路段页统一） -->
<script src="sections-data.js"></script>
<script>
/* ════════════════════════════════════════════════════════════
   数据层：读取与主 app 完全相同的 localStorage 键，复刻核心匹配逻辑。
   不依赖任何外部库，纯前端渲染，保证长列表可完整滚动。
   ════════════════════════════════════════════════════════════ */
const t = window.GHTI18N.t;
const LS = {
  itinerary: 'ght_itinerary',
  actual:    'ght_actual',
  start:     'ght_itinerary_start',
  preset:    'ght_preset',
  startPlace:'ght_start_place'
};
function load(k){ try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch(e){ return null; } }
// 主 app 把「出发日期 / 起点地名」作为原始字符串存储（未 JSON.stringify），须原样读取
function loadRaw(k){ try { const v = localStorage.getItem(k); return v==null ? '' : String(v); } catch(e){ return ''; } }

const SECTION_COLORS = ['#FF6B6B','#FFA94D','#FFD43B','#69DB7C','#38D9A9','#4DABF7','#748FFC','#DA77F2','#F783AC','#63E6BE'];
const SECTION_NAMES  = ['干城章嘉保护区','马卡鲁-巴润国家公园','萨加玛塔国家公园','高里香卡保护区','郎当国家公园','马纳斯鲁保护区','安纳普尔纳保护区','道拉吉里-多尔普东','谢伊-佛克松多国家公园','拉拉国家公园'];

/* 段配色：优先用 13 区域 GHT_SECTIONS（与首页一致），缺失时回退旧 10 段数组 */
const SEC = (typeof window !== 'undefined' && window.GHT_SECTIONS) ? window.GHT_SECTIONS : [];
function regionOf(id){
  const r = SEC[(id||1)-1];
  if (r) return r;
  return { zh: (SECTION_NAMES[(id||1)-1] || ('第'+id+'段')), color: (SECTION_COLORS[(id||1)-1] || '#888') };
}

/* ── 日期工具（YYYY-MM-DD）── */
function pad(n){ return String(n).padStart(2,'0'); }
function ymd(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function parseYmd(s){ if(!s) return null; const [y,m,d]=s.split('-').map(Number); if(!y||!m||!d) return null; return new Date(y,m-1,d); }
function addDays(s,n){ const dt=parseYmd(s); if(!dt) return null; dt.setDate(dt.getDate()+n); return ymd(dt); }
function dayDiff(a,b){ const da=parseYmd(a), db=parseYmd(b); if(!da||!db) return null; return Math.round((da-db)/86400000); }
function shortYmd(s){ return s ? s.slice(5) : '—'; }

/* ── 地理工具 ── */
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000, toR=x=>x*Math.PI/180;
  const dLat=toR(lat2-lat1), dLon=toR(lon2-lon1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
function nearestLabel(wpts, pt, maxDist){
  if(!wpts||!wpts.length||!pt) return null;
  let best=null,bestD=Infinity,bestCamp=null,bestCampD=Infinity;
  wpts.forEach(w=>{
    const d=haversine(pt.lat,pt.lon,w.lat,w.lon);
    if(d<bestD){bestD=d;best=w;}
    if(w._type==='camp'&&d<bestCampD){bestCampD=d;bestCamp=w;}
  });
  const chosen=bestCamp||best, cd=bestCamp?bestCampD:bestD;
  if(chosen&&cd<=maxDist) return (chosen.desc||chosen.name||'').trim();
  return null;
}
function fmtCoord(pt){ return pt? pt.lat.toFixed(3)+','+pt.lon.toFixed(3) : '—'; }

/* ════════════════════════════════════════════════════════════
   核心：把「实际轨迹(按文件名 dayNum)」匹配回「计划日」
   （与主 app matchItineraryToActuals 逻辑一致）
   ════════════════════════════════════════════════════════════ */
function buildDays(){
  const planned = load(LS.itinerary) || [];
  const actuals = load(LS.actual) || [];
  const startDateReal = loadRaw(LS.start);
  const startOk = !!parseYmd(startDateReal);
  // 缺出发日期 / 格式无效时，用「今天」作为临时基准，保证 88 天仍能上日历，不再整页崩溃
  const startDate = startOk ? startDateReal : ymd(new Date());
  const preset = load(LS.preset) || {};
  const wpts = (preset && preset.waypoints) || [];

  const dayByNum = {};
  planned.forEach(d => { dayByNum[d.day] = d; });

  const offsets = [], unmatched = [];
  actuals.forEach(track => {
    if(!track.distance) return;
    const day = (track.dayNum!=null) ? dayByNum[track.dayNum] : null;
    if(!day){ unmatched.push(track); return; }

    const pts = track.trackPoints || [];
    const startPt = pts[0] || null;
    const endPt = pts.length ? pts[pts.length-1] : null;
    const actFrom = startPt ? (nearestLabel(wpts,startPt,6000) || fmtCoord(startPt)) : '—';
    const actTo   = endPt   ? (nearestLabel(wpts,endPt,6000)   || fmtCoord(endPt))   : '—';

    const actual = {
      distance: track.distance,
      elevGain: track.elevGain,
      elevLoss: track.elevLoss,
      durationStr: track.durationStr,
      avgSpeed: track.avgSpeed,
      startTime: track.startTime,
      endTime: track.endTime,
      date: track.date || null,
      actFrom, actTo,
      file: track.name || ('day'+String(track.dayNum!=null?track.dayNum:'?').padStart(2,'0'))
    };

    if(track.date && startDate){
      const plannedD = addDays(startDate, (day.day-1));
      const dd = dayDiff(track.date, plannedD);
      if(dd!=null) actual.onTrack = dd<0?'ahead':dd>0?'behind':'on-track';
      if(dd!=null) offsets.push(dd);
    }
    day.actual = actual;
  });

  let overallSlip = 0;
  if(offsets.length){
    const freq={}; offsets.forEach(o=>freq[o]=(freq[o]||0)+1);
    let best=0,bestF=0;
    Object.keys(freq).forEach(k=>{ const v=+k; if(freq[k]>bestF||(freq[k]===bestF&&Math.abs(v)>Math.abs(best))){best=v;bestF=freq[k];} });
    overallSlip=best;
  }

  /* 路线平均海拔：预设轨迹点的海拔均值（计划路线特征，与上传进度无关） */
  let avgElev = 0;
  if (preset && preset.trackPoints && preset.trackPoints.length) {
    let sum = 0, n = 0;
    preset.trackPoints.forEach(p => { const e = (p.elev != null) ? p.elev : (p.ele != null ? p.ele : null); if (e != null) { sum += +e; n++; } });
    avgElev = n ? Math.round(sum / n) : 0;
  }

  return { planned, startDate, startDateReal, startOk, overallSlip, unmatched, avgElev };
}

function getPlannedDate(startDate, dayNum){ return startDate ? addDays(startDate, dayNum-1) : null; }
function fmtPlannedShort(startDate, dayNum){ const d=getPlannedDate(startDate, dayNum); return d?shortYmd(d):'—'; }

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ── 状态 ── */
function delayLabel(reason){ return t('it.delay.' + (reason || 'other')); }

const DELAY_ICON = { weather: '☁️', injured: '🩹', tired: '😴', other: '⚠️' };

function toggleDelay(dayNum, reason) {
  if (!DATA || !DATA.planned.length) return;
  const day = DATA.planned.find(d => d.day === dayNum);
  if (!day) return;
  if (day.delayed && day.delayReason === reason) {
    // 点击已选原因 = 取消延误
    day.delayed = false;
    day.delayReason = null;
  } else {
    day.delayed = true;
    day.delayReason = reason || 'other';
  }
  saveItinerary();
  // 刷新显示
  render();
  // 如果抽屉开着，重新打开以刷新内容
  const drawer = document.getElementById('drawer');
  if (drawer.classList.contains('open')) {
    const key = drawer.dataset.openKey;
    if (key) openDrawer(key, MAP[key] || []);
  }
}

function saveItinerary() {
  try { localStorage.setItem(LS.itinerary, JSON.stringify(DATA.planned)); } catch(e) {}
}
function statusOf(d){
  if(d.actual) return d.actual.onTrack;          // 'ahead' | 'behind' | 'on-track'
  if(d.isRestDay) return 'rest';
  if(d.delayed) return 'delay';
  return 'wait';
}
const STATUS = {
  'on-track': { c:'var(--accent)',       t:t('st.ontrack') },
  'ahead':    { c:'var(--green)',        t:t('st.ahead') },
  'behind':   { c:'var(--red)',          t:t('st.behind') },
  'wait':     { c:'var(--text-dimmer)',  t:t('st.wait') },
  'rest':     { c:'#2e9e54',             t:t('st.rest') },
  'delay':    { c:'var(--yellow)',       t:t('st.delay') }
};

/* ════════════════════════════════════════════════════════════
   摘要
   ════════════════════════════════════════════════════════════ */
function renderSummary(data){
  const { planned, overallSlip, avgElev } = data;
  const totalDays = planned.length;
  const daysWithData = planned.filter(d=>d.actual).length;
  const plannedTotal = Math.round(planned.reduce((s,d)=>s+(+d.plannedDistance||0),0)*10)/10;
  const actualTotal = Math.round(planned.reduce((s,d)=>s+(d.actual?+d.actual.distance:0),0)*10)/10;
  const plannedGain = Math.round(planned.reduce((s,d)=>s+(+d.plannedElevGain||0),0));
  const plannedLoss = Math.round(planned.reduce((s,d)=>s+(+d.plannedElevLoss||0),0));
  const actualGain  = Math.round(planned.reduce((s,d)=>s+(d.actual?(+d.actual.elevGain||0):0),0));
  const delayedCount = planned.filter(d=>d.delayed).length;
  const ahead = planned.filter(d=>d.actual&&!d.delayed&&d.actual.onTrack==='ahead').length;
  const behind= planned.filter(d=>(d.actual&&!d.delayed&&d.actual.onTrack==='behind')||d.delayed).length;
  const onTrack=planned.filter(d=>d.actual&&!d.delayed&&d.actual.onTrack==='on-track').length;
  const pctDone = totalDays? Math.round(daysWithData/totalDays*100):0;

  let slip='';
  if(overallSlip>0) slip=`<div class="slip-note">${t('it.slip.late').replace('{n}', overallSlip)}</div>`;
  else if(overallSlip<0) slip=`<div class="slip-note">${t('it.slip.early').replace('{n}', Math.abs(overallSlip))}</div>`;

  return `
    <div class="stat-row">
      <div class="stat-group-label">${t('it.sum.groupProgress')}</div>
      <div class="stat"><div class="v blue">${totalDays}</div><div class="l">${t('it.sum.total')}</div></div>
      <div class="stat"><div class="v green">${daysWithData} · ${pctDone}%</div><div class="l">${t('it.sum.recorded')}</div></div>
      <div class="stat"><div class="v green">${ahead}</div><div class="l">${t('it.sum.ahead')}</div></div>
      <div class="stat"><div class="v blue">${onTrack}</div><div class="l">${t('it.sum.ontrack')}</div></div>
      <div class="stat"><div class="v red">${behind}</div><div class="l">${t('it.sum.behind')}</div></div>
    </div>
    <div class="stat-row">
      <div class="stat-group-label">${t('it.sum.groupElev')}</div>
      <div class="stat"><div class="v">${plannedTotal}km</div><div class="l">${t('it.sum.planned')}</div></div>
      <div class="stat"><div class="v green">${actualTotal}km</div><div class="l">${t('it.sum.actual')}</div></div>
      <div class="stat"><div class="v blue">${plannedGain.toLocaleString()}m</div><div class="l">${t('it.sum.gainPlan')}</div></div>
      <div class="stat"><div class="v green">${actualGain.toLocaleString()}m</div><div class="l">${t('it.sum.gainDone')}</div></div>
      <div class="stat"><div class="v">${plannedLoss.toLocaleString()}m</div><div class="l">${t('it.sum.lossPlan')}</div></div>
      <div class="stat"><div class="v">${avgElev?avgElev.toLocaleString()+'m':'—'}</div><div class="l">${t('it.sum.avgElev')}</div></div>
    </div>
    ${slip}`;
}

/* ════════════════════════════════════════════════════════════
   日历渲染
   ════════════════════════════════════════════════════════════ */
let DATA = null;
let viewY, viewM;                 // 当前显示的年/月（0-based）
let MODE = 'plan';                // 'plan' | 'actual'
let FILTER = 'all';               // 'all' | 'done' | 'todo'
let MAP = {};                     // dateKey -> [day,...]

function dayKey(d){
  if(MODE==='actual' && d.actual && d.actual.date) return d.actual.date;
  return getPlannedDate(DATA.startDate, d.day) || null;
}
function buildMap(){
  const m = {};
  DATA.planned.forEach(d=>{
    if(FILTER==='done' && !d.actual) return;
    if(FILTER==='todo' && d.actual) return;
    const k = dayKey(d);
    if(!k) return;
    (m[k] = m[k] || []).push(d);
  });
  return m;
}

function renderCalendar(){
  if(!DATA.planned.length) return;
  MAP = buildMap();
  const y = viewY, mo = viewM;
  document.getElementById('calTitle').textContent = y + ' 年 ' + (mo+1) + ' 月';

  const first = new Date(y, mo, 1);
  const startOffset = (first.getDay() + 6) % 7;     // 周一为起点
  const daysInMonth = new Date(y, mo+1, 0).getDate();
  const todayStr = ymd(new Date());
  const wd = ['一','二','三','四','五','六','日'];
  let html = wd.map(w=>`<div class="wd">${w}</div>`).join('');

  // 前置补白（上月）
  const prevDays = new Date(y, mo, 0).getDate();
  for(let i=startOffset-1; i>=0; i--){
    html += `<div class="cell out"><div class="dnum">${prevDays-i}</div></div>`;
  }
  // 当月
  for(let d=1; d<=daysInMonth; d++){
    const cur = ymd(new Date(y, mo, d));
    const isToday = cur === todayStr;
    const list = MAP[cur] || [];
    let inner = `<div class="dnum">${d}</div>`;
    if(list.length){
      if(list.length === 1){
        const day = list[0];
        const region = regionOf(day.sectionId);
        const st = statusOf(day);
        const cls = ['chip'];
        if(day.isRestDay) cls.push('is-rest');
        if(day.delayed) cls.push('is-delay');
        const planDate = getPlannedDate(DATA.startDate, day.day);
        const ghost = (MODE==='actual' && day.actual && day.actual.date !== planDate)
          ? `<div class="ghost">原计划 ${esc(shortYmd(planDate))}</div>` : '';
        inner += `<button class="chip ${cls.join(' ')}" data-key="${cur}">
          <span class="stripe" style="background:${region.color}"></span>
          <span class="crow"><span class="dlab">D${day.day}</span><span class="sdot" style="background:${STATUS[st].c}"></span></span>
          <span class="route">${esc(day.from)}<span class="ar">→</span>${esc(day.to)}</span>
          <span class="meta"><span>${((+day.plannedDistance)||0).toFixed(1)}km</span><span class="rname">${esc(region.zh)}</span></span>
          ${ghost}</button>`;
      } else {
        // 多天重叠（方案 A）：紧凑块 + 角标，点开看全部
        const region = regionOf(list[0].sectionId);
        const dn = list.map(x=>x.day);
        inner += `<button class="chip" data-key="${cur}">
          <span class="stripe" style="background:${region.color}"></span>
          <span class="crow"><span class="dlab">D${Math.min(...dn)}–D${Math.max(...dn)}</span><span class="badge">${list.length}</span></span>
          <span class="route" style="color:var(--text-dim)">${list.length} 天重叠 ↗</span></button>`;
      }
    }
    html += `<div class="cell${isToday?' today':''}">${inner}</div>`;
  }
  // 后置补白（下月）
  const total = startOffset + daysInMonth;
  const tail = (7 - (total % 7)) % 7;
  for(let d=1; d<=tail; d++){
    html += `<div class="cell out"><div class="dnum">${d}</div></div>`;
  }
  document.getElementById('grid').innerHTML = html;

  // 计数与跨度
  const visible = Object.keys(MAP)
    .filter(k=>{ const [ky,km,kd]=k.split('-').map(Number); return ky===y && km-1===mo; })
    .reduce((s,k)=>s+MAP[k].length, 0);
  document.getElementById('countNote').textContent = t('it.count').replace('{v}', visible).replace('{t}', DATA.planned.length);
  const fd = getPlannedDate(DATA.startDate, DATA.planned[0].day);
  const ld = getPlannedDate(DATA.startDate, DATA.planned[DATA.planned.length-1].day);
  document.getElementById('spanNote').textContent = t('it.span').replace('{f}', fd||'?').replace('{l}', ld||'?+');

  // 绑定点击
  document.querySelectorAll('.chip[data-key]').forEach(el=>{
    el.addEventListener('click', ()=> openDrawer(el.dataset.key, MAP[el.dataset.key]));
  });
}

/* ════════════════════════════════════════════════════════════
   详情抽屉：单天 or 多天重叠
   ════════════════════════════════════════════════════════════ */
function dayDetail(d){
  const region = regionOf(d.sectionId);
  const st = statusOf(d);
  const col = region.color;
  const stInfo = STATUS[st];
  const planDate = getPlannedDate(DATA.startDate, d.day);
  const chipCls = st === 'on-track' ? 'ontime' : st;

  const head = `<div class="dd-h">
    <span class="day-badge"><span class="dot" style="background:${col}"></span><span class="num">Day ${d.day}</span></span>
    <span class="chip2 ${chipCls}">${stInfo.t}</span>
    <span class="dd-sub">第 <b>${d.sectionId}</b> 段 · ${esc(region.zh)}</span>
    <span class="dd-delay">${d.delayed
      ? ['weather','injured','tired','other'].map(r => '<button class="dd-dbtn' + (d.delayReason === r ? ' on' : '') + '" onclick="event.stopPropagation();toggleDelay(' + d.day + ",'" + r + '\')" title="' + delayLabel(r) + '">' + DELAY_ICON[r] + '</button>').join('')
      : '<button class="dd-dbtn" onclick="event.stopPropagation();toggleDelay(' + d.day + ')" title="' + t('it.legend.delay') + '">☁️</button>'
    }</span>
  </div>`;
  const meta = `<div class="dd-sub" style="margin:2px 0 8px">计划 ${planDate||'—'}${d.actual&&d.actual.date?` · 实际 ${esc(shortYmd(d.actual.date))}`:''}</div>`;

  const planCol = `
    <div class="col plan"><div class="col-title">${t('it.drawer.plan')}</div>
      <div class="row"><span class="k">${t('it.drawer.route')}</span><span class="v route">${esc(d.from)}<span class="arrow">→</span>${esc(d.to)}</span></div>
      <div class="row"><span class="k">${t('it.drawer.dist')}</span><span class="v plan">${(+d.plannedDistance||0).toFixed(1)}km</span></div>
      <div class="row"><span class="k">${t('it.drawer.asc')}</span><span class="v plan">${(+d.plannedElevGain||0).toLocaleString()}m</span></div>
      <div class="row"><span class="k">${t('it.drawer.desc')}</span><span class="v plan">${(+d.plannedElevLoss||0).toLocaleString()}m</span></div>
      ${d.passes&&d.passes.length?`<div class="passes">${t('it.drawer.passes')}<span class="tag">${esc(d.passes.join('、'))}</span></div>`:''}
      ${d.isRestDay?`<div class="passes">${t('it.drawer.rest')}</div>`:''}${d.delayed?`<div class="passes">${delayLabel(d.delayReason)}</div>`:''}
    </div>`;

  let actCol;
  if(!d.actual){
    let msg = d.isRestDay ? t('it.pending.rest') : d.delayed ? delayLabel(d.delayReason) + (GHTI18N.getLang()==='en'?' · no progress':' · 未行进') : t('it.pending.wait');
    actCol = `<div class="col actual"><div class="col-title">${t('it.drawer.actual')}</div><div class="pending">${msg}</div></div>`;
  } else {
    const a = d.actual;
    actCol = `<div class="col actual"><div class="col-title">${t('it.drawer.actual')}</div>
      <div class="row"><span class="k">${t('it.drawer.date')}</span><span class="v">${esc(shortYmd(a.date))}</span></div>
      <div class="row"><span class="k">${t('it.drawer.route')}</span><span class="v route">${esc(a.actFrom)}<span class="arrow">→</span>${esc(a.actTo)}</span></div>
      <div class="row"><span class="k">${t('it.drawer.dist')}</span><span class="v">${a.distance.toFixed(1)}km</span></div>
      <div class="row"><span class="k">${t('it.drawer.asc')}</span><span class="v">${(+a.elevGain||0).toLocaleString()}m</span></div>
      <div class="row"><span class="k">${t('it.drawer.dur')}</span><span class="v">${a.durationStr||'—'}${a.avgSpeed?` · ${a.avgSpeed}km/h`:''}</span></div>
      <div class="row"><span class="k">${t('it.drawer.file')}</span><span class="v" style="font-size:11px;color:var(--text-dim)">${esc(a.file)}</span></div>
      ${a.actTo&&d.to&&a.actTo!==d.to?`<div class="mismatch">${t('it.mismatch')}</div>`:''}
    </div>`;
  }

  let body = `<div class="cols">${planCol}${actCol}</div>`;
  if(d.actual){
    const planV = +d.plannedDistance||0, actV = +d.actual.distance||0;
    const diff = Math.round((actV-planV)*10)/10;
    const dcls = Math.abs(diff)<0.05 ? 'dim' : (diff>0?'green':'red');
    const dsign = Math.abs(diff)<0.05 ? '±0.0' : (diff>0?'+':'')+diff.toFixed(1);
    const maxV = Math.max(planV, actV, 0.1);
    const pw = Math.round(planV/maxV*100), aw = Math.round(actV/maxV*100);
    body += `<div class="cmp"><div class="cmp-head"><span class="lbl">${t('it.cmp.lbl')}</span><span class="delta ${dcls}">差值 ${dsign} km</span></div>
      <div class="bars">
        <div class="bar-row"><span class="bl">${t('it.cmp.plan')}</span><div class="bar-track"><div class="bar-fill plan" style="width:${pw}%"></div></div><span class="bv">${planV.toFixed(1)}km</span></div>
        <div class="bar-row"><span class="bl">${t('it.cmp.actual')}</span><div class="bar-track"><div class="bar-fill actual" style="width:${aw}%"></div></div><span class="bv">${actV.toFixed(1)}km</span></div>
      </div></div>`;
  }
  return head + meta + body;
}

function openDrawer(key, list){
  if(!list || !list.length) return;
  const multi = list.length > 1;
  document.getElementById('dBadge').innerHTML = multi
    ? `<span class="num">${key} · ${list.length} 天重叠</span>`
    : `<span class="num">${key}</span>`;
  document.getElementById('dBody').innerHTML = list.map(d=>dayDetail(d)).join('<hr class="dv-sep">');
  document.getElementById('scrim').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer').setAttribute('aria-hidden','false');
  document.getElementById('drawer').dataset.openKey = key;
}
function closeDrawer(){
  document.getElementById('scrim').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer').setAttribute('aria-hidden','true');
}

/* ════════════════════════════════════════════════════════════
   入口 render
   ════════════════════════════════════════════════════════════ */
function render(){
  DATA = buildDays();
  const summaryEl = document.getElementById('summary');
  const gridEl = document.getElementById('grid');

  // 出发日期缺失/无效提示横幅
  const warn = document.getElementById('dateWarn');
  if(warn){
    if(!DATA.startOk){
      warn.style.display = 'block';
      warn.innerHTML = '⚠️ 未设置出发日期（或格式无效）。日历按「今天」起算的<b>临时排期</b>显示 '+DATA.planned.length+' 天；请到 <a href="index.html">地图追踪页</a> 设置真实出发日，以获得准确日历与「超前/落后」判定。';
    } else {
      warn.style.display = 'none';
    }
  }

  if(!DATA.planned.length){
    summaryEl.innerHTML = '';
    gridEl.innerHTML = `
      <div class="empty" style="grid-column:1/-1;">
        <div class="ico">🗺️</div>
        <h2>${t('it.empty.h')}</h2>
        <p>${t('it.empty.p').replace('地图追踪页', '<a href="index.html">地图追踪页</a>')}</p>
      </div>`;
    document.getElementById('countNote').textContent = '';
    document.getElementById('spanNote').textContent = '';
    document.getElementById('footNote').textContent = '';
    return;
  }

  summaryEl.innerHTML = renderSummary(DATA);

  // 默认显示出发日所在月份（DATA.startDate 已是安全值：真实日期或今天兜底）
  if(viewY === undefined){
    const sd = parseYmd(DATA.startDate) || new Date();
    viewY = sd.getFullYear(); viewM = sd.getMonth();
  }
  renderCalendar();

  const datePart = DATA.startOk
    ? t('it.foot.date').replace('{d}', esc(DATA.startDateReal))
    : '（未设置出发日期 · 临时排期）';
  document.getElementById('footNote').innerHTML = t('it.foot').replace('{date}', datePart);
}

/* 语言切换时重渲染（chrome 文案随语言更新） */
window.onLangChange = function () {
  if (typeof DATA !== 'undefined') {
    if (!DATA.planned || !DATA.planned.length) { render(); return; }
    document.getElementById('summary').innerHTML = renderSummary(DATA);
    renderCalendar();
    const datePart = DATA.startOk
      ? t('it.foot.date').replace('{d}', esc(DATA.startDateReal))
      : '（未设置出发日期 · 临时排期）';
    document.getElementById('footNote').innerHTML = t('it.foot').replace('{date}', datePart);
  }
};

/* ── 控件事件 ── */
document.getElementById('segMode').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  MODE = b.dataset.mode;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle('active', x===b));
  if(viewY!==undefined) renderCalendar();
});
document.getElementById('segFilter').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  FILTER = b.dataset.filter;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle('active', x===b));
  if(viewY!==undefined) renderCalendar();
});
document.getElementById('prevM').addEventListener('click', ()=>{ viewM--; if(viewM<0){ viewM=11; viewY--; } renderCalendar(); });
document.getElementById('nextM').addEventListener('click', ()=>{ viewM++; if(viewM>11){ viewM=0; viewY++; } renderCalendar(); });
document.getElementById('scrim').addEventListener('click', closeDrawer);
document.getElementById('dClose').addEventListener('click', closeDrawer);
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeDrawer(); });

/* 跨标签页同步：地图页更新后本页自动刷新 */
window.addEventListener('storage', e=>{
  if([LS.itinerary,LS.actual,LS.start,LS.preset].includes(e.key)) render();
});

render();

</script>
