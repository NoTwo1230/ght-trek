<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHT 行程安排 · 计划 vs 实际</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap">
<style>
  :root {
    /* ── 与主 app 完全一致的 Adventure Dark Palette ── */
    --bg: #0a0e14;
    --panel: #0d1219;
    --panel-alt: #161b22;
    --panel-bg: rgba(13,18,25,0.95);
    --border: #1c2333;
    --border-light: #21262d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-dimmer: #7d8590;
    --accent: #58a6ff;
    --accent-bg: #1a3a5c;
    --accent2: #f0883e;
    --green: #3fb950;
    --red: #f85149;
    --red-deep: #b62324;
    --purple: #bc8cff;
    --yellow: #d29922;
    --cyan: #39d2c0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  :focus:not(:focus-visible) { outline: none; }

  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(88,166,255,0.08), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(63,185,80,0.06), transparent 60%),
      var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ── 顶部栏（吸顶 + 毛玻璃）── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px;
    background: rgba(10,14,20,0.82);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .topbar .title {
    font-size: 17px; font-weight: 700; letter-spacing: .3px;
    display: flex; align-items: center; gap: 9px; white-space: nowrap;
  }
  .topbar .title .glyph {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--accent-bg); border: 1px solid rgba(88,166,255,0.25);
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .topbar .title small { font-weight: 400; color: var(--text-dim); font-size: 12px; }

  .back-link {
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 6px;
    text-decoration: none; color: var(--text-dim);
    border: 1px solid var(--border-light); border-radius: 8px;
    padding: 7px 13px; font-size: 12px; transition: all .2s;
  }
  .back-link:hover { color: var(--text); border-color: var(--accent); background: rgba(88,166,255,0.08); }

  /* ── 摘要条 ── */
  .summary {
    display: flex; flex-wrap: wrap; gap: 10px;
    padding: 16px 20px 6px;
  }
  .stat {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 11px 16px; min-width: 116px; flex: 1 1 auto;
  }
  .stat .v { font-size: 21px; font-weight: 700; line-height: 1.1; }
  .stat .v.green { color: var(--green); }
  .stat .v.blue { color: var(--accent); }
  .stat .v.amber { color: var(--yellow); }
  .stat .v.red { color: var(--red); }
  .stat .l { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  .slip-note {
    width: 100%;
    background: rgba(255,169,77,0.12); border: 1px solid rgba(255,169,77,0.35);
    color: #FFA94D; border-radius: 10px; padding: 9px 14px; font-size: 12px; line-height: 1.5;
  }

  /* ── 工具栏（筛选 / 排序）── */
  .toolbar {
    position: sticky; top: 59px; z-index: 90;
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 12px 20px;
    background: rgba(10,14,20,0.78);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .toolbar .group { display: flex; align-items: center; gap: 6px; }
  .toolbar .glabel { font-size: 11px; color: var(--text-dim); margin-right: 2px; }
  .seg {
    display: inline-flex; background: var(--panel); border: 1px solid var(--border);
    border-radius: 9px; overflow: hidden;
  }
  .seg button {
    border: none; background: transparent; color: var(--text-dim);
    padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: inherit;
    transition: all .15s;
  }
  .seg button:hover { color: var(--text); }
  .seg button.active { background: var(--accent-bg); color: var(--accent); }
  .spacer { flex: 1; }
  .count-note { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  /* ── 列表 ── */
  .list { padding: 16px 20px 60px; display: flex; flex-direction: column; gap: 14px; max-width: 1100px; margin: 0 auto; width: 100%; }

  .day-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: 14px;
    padding: 16px 18px;
    transition: border-color .2s, transform .15s, box-shadow .2s;
  }
  .day-card:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.35); border-color: var(--border-light); }
  .day-card.is-rest { border-left-color: var(--green); }
  .day-card.is-delay { border-left-color: var(--yellow); }
  .day-card.is-today { box-shadow: 0 0 0 1px rgba(88,166,255,0.4); }

  .day-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .day-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--panel-alt); border: 1px solid var(--border-light);
    border-radius: 10px; padding: 6px 12px; font-weight: 700; font-size: 14px;
  }
  .day-badge .dot { width: 10px; height: 10px; border-radius: 50%; }
  .day-badge .num { color: var(--text); }
  .sec-name { font-size: 12px; color: var(--text-dim); }
  .sec-name b { color: var(--text); font-weight: 500; }

  .chip {
    font-size: 11px; padding: 3px 9px; border-radius: 20px; white-space: nowrap; border: 1px solid transparent;
  }
  .chip.ahead { background: rgba(63,185,80,0.15); color: var(--green); border-color: rgba(63,185,80,0.35); }
  .chip.behind { background: rgba(248,81,73,0.15); color: var(--red); border-color: rgba(248,81,73,0.35); }
  .chip.ontime { background: rgba(88,166,255,0.12); color: var(--accent); border-color: rgba(88,166,255,0.3); }
  .chip.rest { background: rgba(63,185,80,0.12); color: var(--green); border-color: rgba(63,185,80,0.3); }
  .chip.delay { background: rgba(210,153,34,0.14); color: var(--yellow); border-color: rgba(210,153,34,0.32); }
  .chip.today { background: var(--accent-bg); color: var(--accent); border-color: rgba(88,166,255,0.3); }
  .chip.wait { background: rgba(139,148,158,0.12); color: var(--text-dim); border-color: rgba(139,148,158,0.28); }

  /* 计划 / 实际 双栏 */
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .col {
    border-radius: 11px; padding: 12px 14px;
    border: 1px solid transparent;
  }
  .col.plan { background: rgba(88,166,255,0.05); border-color: rgba(88,166,255,0.14); }
  .col.actual { background: rgba(63,185,80,0.05); border-color: rgba(63,185,80,0.14); }
  .col-title { font-size: 11px; font-weight: 700; letter-spacing: .4px; margin-bottom: 9px; display: flex; align-items: center; gap: 6px; }
  .col.plan .col-title { color: var(--accent); }
  .col.actual .col-title { color: var(--green); }

  .row { display: flex; align-items: baseline; gap: 8px; padding: 3px 0; font-size: 12.5px; }
  .row .k { color: var(--text-dim); min-width: 56px; flex-shrink: 0; font-size: 11.5px; }
  .row .v { color: var(--text); }
  .row .v.plan { color: var(--text-dim); }
  .route { font-size: 12.5px; color: var(--text); line-height: 1.5; }
  .route .arrow { color: var(--accent); margin: 0 5px; }
  .passes { margin-top: 6px; font-size: 11px; color: var(--text-dim); line-height: 1.6; }
  .passes .tag { color: var(--purple); }
  .mismatch { margin-top: 8px; font-size: 11px; color: var(--red); background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.28); border-radius: 7px; padding: 6px 9px; line-height: 1.5; }
  .pending { color: var(--text-dim); font-style: italic; font-size: 12px; }

  /* 对比条 */
  .cmp { margin-top: 14px; border-top: 1px dashed var(--border); padding-top: 12px; }
  .cmp-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .cmp-head .lbl { font-size: 11px; color: var(--text-dim); }
  .cmp-head .delta { font-size: 12px; font-weight: 600; }
  .cmp-head .delta.green { color: var(--green); }
  .cmp-head .delta.red { color: var(--red); }
  .cmp-head .delta.dim { color: var(--text-dim); }
  .bars { display: flex; flex-direction: column; gap: 6px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-row .bl { font-size: 10.5px; color: var(--text-dim); width: 34px; flex-shrink: 0; }
  .bar-track { flex: 1; height: 9px; background: var(--panel-alt); border-radius: 6px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width .4s ease; }
  .bar-fill.plan { background: linear-gradient(90deg, var(--accent), #79b8ff); }
  .bar-fill.actual { background: linear-gradient(90deg, var(--green), #56d364); }
  .bar-row .bv { font-size: 11px; color: var(--text); width: 64px; text-align: right; flex-shrink: 0; }

  /* 空状态 */
  .empty { max-width: 520px; margin: 80px auto; text-align: center; color: var(--text-dim); padding: 0 20px; }
  .empty .ico { font-size: 54px; margin-bottom: 16px; }
  .empty h2 { color: var(--text); font-size: 17px; margin-bottom: 10px; font-weight: 600; }
  .empty p { font-size: 13px; line-height: 1.8; }
  .empty a { color: var(--accent); text-decoration: none; border-bottom: 1px solid rgba(88,166,255,0.4); }
  .empty code { background: var(--panel-alt); padding: 1px 6px; border-radius: 5px; font-size: 12px; color: var(--cyan); }

  /* 进度环（列表底部总览）*/
  .foot-note { text-align: center; font-size: 11px; color: var(--text-dimmer); padding: 24px 20px 8px; line-height: 1.7; }

  @media (max-width: 640px) {
    .cols { grid-template-columns: 1fr; }
    .stat { min-width: calc(50% - 5px); }
    .topbar .title small { display: none; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="title">
    <span class="glyph">📋</span>
    <span>行程安排<small> · 计划 vs 实际徒步对比</small></span>
  </div>
  <a class="back-link" href="index.html" title="返回地图追踪页">🗺️ 返回地图</a>
</header>

<div id="summary" class="summary"></div>

<div class="toolbar">
  <div class="group">
    <span class="glabel">排序</span>
    <div class="seg" id="segSort">
      <button data-sort="asc" class="active">Day 升序</button>
      <button data-sort="desc">Day 降序</button>
    </div>
  </div>
  <div class="group">
    <span class="glabel">筛选</span>
    <div class="seg" id="segFilter">
      <button data-filter="all" class="active">全部</button>
      <button data-filter="done">已记录</button>
      <button data-filter="todo">未记录</button>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="count-note" id="countNote"></div>
</div>

<main id="list" class="list"></main>

<div class="foot-note" id="footNote"></div>

<script>
/* ════════════════════════════════════════════════════════════
   数据层：读取与主 app 完全相同的 localStorage 键，复刻核心匹配逻辑。
   不依赖任何外部库，纯前端渲染，保证长列表可完整滚动。
   ════════════════════════════════════════════════════════════ */
const LS = {
  itinerary: 'ght_itinerary',
  actual:    'ght_actual',
  start:     'ght_itinerary_start',
  preset:    'ght_preset',
  startPlace:'ght_start_place'
};
function load(k){ try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch(e){ return null; } }
// 主 app 把「出发日期 / 起点地名」作为原始字符串存储（未 JSON.stringify），须原样读取
function loadRaw(k){ try { const v = localStorage.getItem(k); return v==null ? '' : String(v); } catch(e){ return ''; } }

const SECTION_COLORS = ['#FF6B6B','#FFA94D','#FFD43B','#69DB7C','#38D9A9','#4DABF7','#748FFC','#DA77F2','#F783AC','#63E6BE'];
const SECTION_NAMES  = ['干城章嘉保护区','马卡鲁-巴润国家公园','萨加玛塔国家公园','高里香卡保护区','郎当国家公园','马纳斯鲁保护区','安纳普尔纳保护区','道拉吉里-多尔普东','谢伊-佛克松多国家公园','拉拉国家公园'];

/* ── 日期工具（YYYY-MM-DD）── */
function pad(n){ return String(n).padStart(2,'0'); }
function ymd(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function parseYmd(s){ if(!s) return null; const [y,m,d]=s.split('-').map(Number); if(!y||!m||!d) return null; return new Date(y,m-1,d); }
function addDays(s,n){ const dt=parseYmd(s); if(!dt) return null; dt.setDate(dt.getDate()+n); return ymd(dt); }
function dayDiff(a,b){ const da=parseYmd(a), db=parseYmd(b); if(!da||!db) return null; return Math.round((da-db)/86400000); }
function shortYmd(s){ return s ? s.slice(5) : '—'; }

/* ── 地理工具 ── */
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000, toR=x=>x*Math.PI/180;
  const dLat=toR(lat2-lat1), dLon=toR(lon2-lon1);
  const a=Math.sin(dLat/2)**2 + Math.cos(toR(lat1))*Math.cos(toR(lat2))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
function nearestLabel(wpts, pt, maxDist){
  if(!wpts||!wpts.length||!pt) return null;
  let best=null,bestD=Infinity,bestCamp=null,bestCampD=Infinity;
  wpts.forEach(w=>{
    const d=haversine(pt.lat,pt.lon,w.lat,w.lon);
    if(d<bestD){bestD=d;best=w;}
    if(w._type==='camp'&&d<bestCampD){bestCampD=d;bestCamp=w;}
  });
  const chosen=bestCamp||best, cd=bestCamp?bestCampD:bestD;
  if(chosen&&cd<=maxDist) return (chosen.desc||chosen.name||'').trim();
  return null;
}
function fmtCoord(pt){ return pt? pt.lat.toFixed(3)+','+pt.lon.toFixed(3) : '—'; }

/* ════════════════════════════════════════════════════════════
   核心：把「实际轨迹(按文件名 dayNum)」匹配回「计划日」
   （与主 app matchItineraryToActuals 逻辑一致）
   ════════════════════════════════════════════════════════════ */
function buildDays(){
  const planned = load(LS.itinerary) || [];
  const actuals = load(LS.actual) || [];
  const startDate = loadRaw(LS.start);
  const preset = load(LS.preset) || {};
  const wpts = (preset && preset.waypoints) || [];

  const dayByNum = {};
  planned.forEach(d => { dayByNum[d.day] = d; });

  const offsets = [], unmatched = [];
  actuals.forEach(track => {
    if(!track.distance) return;
    const day = (track.dayNum!=null) ? dayByNum[track.dayNum] : null;
    if(!day){ unmatched.push(track); return; }

    const pts = track.trackPoints || [];
    const startPt = pts[0] || null;
    const endPt = pts.length ? pts[pts.length-1] : null;
    const actFrom = startPt ? (nearestLabel(wpts,startPt,6000) || fmtCoord(startPt)) : '—';
    const actTo   = endPt   ? (nearestLabel(wpts,endPt,6000)   || fmtCoord(endPt))   : '—';

    const actual = {
      distance: track.distance,
      elevGain: track.elevGain,
      elevLoss: track.elevLoss,
      durationStr: track.durationStr,
      avgSpeed: track.avgSpeed,
      startTime: track.startTime,
      endTime: track.endTime,
      date: track.date || null,
      actFrom, actTo,
      file: track.name || ('day'+String(track.dayNum!=null?track.dayNum:'?').padStart(2,'0'))
    };

    if(track.date && startDate){
      const plannedD = addDays(startDate, (day.day-1));
      const dd = dayDiff(track.date, plannedD);
      if(dd!=null) actual.onTrack = dd<0?'ahead':dd>0?'behind':'on-track';
      if(dd!=null) offsets.push(dd);
    }
    day.actual = actual;
  });

  let overallSlip = 0;
  if(offsets.length){
    const freq={}; offsets.forEach(o=>freq[o]=(freq[o]||0)+1);
    let best=0,bestF=0;
    Object.keys(freq).forEach(k=>{ const v=+k; if(freq[k]>bestF||(freq[k]===bestF&&Math.abs(v)>Math.abs(best))){best=v;bestF=freq[k];} });
    overallSlip=best;
  }

  return { planned, startDate, overallSlip, unmatched };
}

function getPlannedDate(startDate, dayNum){ return startDate ? addDays(startDate, dayNum-1) : null; }
function fmtPlannedShort(startDate, dayNum){ const d=getPlannedDate(startDate,dayNum); return d?shortYmd(d):'—'; }

/* ════════════════════════════════════════════════════════════
   渲染
   ════════════════════════════════════════════════════════════ */
let STATE = { sort:'asc', filter:'all' };

function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function renderSummary(data){
  const { planned, overallSlip } = data;
  const totalDays = planned.length;
  const daysWithData = planned.filter(d=>d.actual).length;
  const plannedTotal = Math.round(planned.reduce((s,d)=>s+(+d.plannedDistance||0),0)*10)/10;
  const actualTotal = Math.round(planned.reduce((s,d)=>s+(d.actual?+d.actual.distance:0),0)*10)/10;
  const ahead = planned.filter(d=>d.actual&&!d.weatherDelay&&d.actual.onTrack==='ahead').length;
  const behind= planned.filter(d=>d.actual&&!d.weatherDelay&&d.actual.onTrack==='behind').length;
  const onTrack=planned.filter(d=>d.actual&&!d.weatherDelay&&d.actual.onTrack==='on-track').length;
  const pctDone = totalDays? Math.round(daysWithData/totalDays*100):0;

  let slip='';
  if(overallSlip>0) slip=`<div class="slip-note">⚠️ 行程整体晚 ${overallSlip} 天（实际 GPS 日期相对计划日期的整体偏移）</div>`;
  else if(overallSlip<0) slip=`<div class="slip-note">⚠️ 行程整体快 ${Math.abs(overallSlip)} 天（实际 GPS 日期相对计划日期的整体偏移）</div>`;

  return `
    <div class="stat"><div class="v blue">${totalDays}</div><div class="l">📅 总行程(天)</div></div>
    <div class="stat"><div class="v green">${daysWithData} · ${pctDone}%</div><div class="l">📡 已记录轨迹</div></div>
    <div class="stat"><div class="v">${plannedTotal}km</div><div class="l">📏 计划总距离</div></div>
    <div class="stat"><div class="v green">${actualTotal}km</div><div class="l">✅ 实际已完成</div></div>
    <div class="stat"><div class="v green">${ahead}</div><div class="l">🟢 超前天数</div></div>
    <div class="stat"><div class="v blue">${onTrack}</div><div class="l">🔵 按计划</div></div>
    <div class="stat"><div class="v red">${behind}</div><div class="l">🔴 未达标</div></div>
    ${slip}`;
}

function deltaTag(planV, actV){
  if(actV==null) return '';
  const diff = Math.round((actV-planV)*10)/10;
  if(Math.abs(diff)<0.05) return `<span class="delta dim">±0.0</span>`;
  if(diff>0) return `<span class="delta green">+${diff.toFixed(1)}</span>`;
  return `<span class="delta red">${diff.toFixed(1)}</span>`;
}

function cmpBars(planV, actV){
  const maxV = Math.max(planV||0, actV||0, 0.1);
  const pw = Math.round((planV/maxV)*100);
  const aw = Math.round((actV/maxV)*100);
  return `
    <div class="bars">
      <div class="bar-row"><span class="bl">计划</span><div class="bar-track"><div class="bar-fill plan" style="width:${pw}%"></div></div><span class="bv">${planV!=null?planV.toFixed(1):'—'}km</span></div>
      <div class="bar-row"><span class="bl">实际</span><div class="bar-track"><div class="bar-fill actual" style="width:${aw}%"></div></div><span class="bv">${actV!=null?actV.toFixed(1):'—'}km</span></div>
    </div>`;
}

function dayCard(day, data){
  const secIdx = (day.sectionId||1)-1;
  const color = SECTION_COLORS[secIdx] || '#888';
  const secName = SECTION_NAMES[secIdx] || '';
  const plannedShort = fmtPlannedShort(data.startDate, day.day);
  const today = ymd(new Date());
  const isToday = getPlannedDate(data.startDate, day.day) === today;

  let statusChip = '';
  if(day.actual){
    statusChip = day.actual.onTrack==='ahead' ? '<span class="chip ahead">🟢 超前</span>'
      : day.actual.onTrack==='behind' ? '<span class="chip behind">🔴 落后</span>'
      : '<span class="chip ontime">🔵 按计划</span>';
  } else if(day.isRestDay){
    statusChip = '<span class="chip rest">🏕️ 休息</span>';
  } else if(day.weatherDelay){
    statusChip = '<span class="chip delay">☁️ 延误</span>';
  } else {
    statusChip = '<span class="chip wait">⏳ 等待 GPS</span>';
  }

  const cls = ['day-card'];
  if(day.isRestDay) cls.push('is-rest');
  if(day.weatherDelay) cls.push('is-delay');
  if(isToday) cls.push('is-today');

  // 计划栏
  const planCol = `
    <div class="col plan">
      <div class="col-title">📋 计划</div>
      <div class="row"><span class="k">日期</span><span class="v plan">${plannedShort}</span></div>
      <div class="row" style="align-items:flex-start;"><span class="k">路线</span><span class="v route">${esc(day.from)}<span class="arrow">→</span>${esc(day.to)}</span></div>
      <div class="row"><span class="k">距离</span><span class="v plan">${(+day.plannedDistance||0).toFixed(1)}km</span></div>
      <div class="row"><span class="k">爬升</span><span class="v plan">${(+day.plannedElevGain||0).toLocaleString()}m</span></div>
      <div class="row"><span class="k">下降</span><span class="v plan">${(+day.plannedElevLoss||0).toLocaleString()}m</span></div>
      ${day.passes&&day.passes.length?`<div class="passes">⛰ 垭口：<span class="tag">${esc(day.passes.join('、'))}</span></div>`:''}
    </div>`;

  // 实际栏
  let actCol;
  if(!day.actual){
    if(day.isRestDay) actCol = `<div class="col actual"><div class="col-title">📡 实际</div><div class="pending">🏕️ 休息 · 未行进</div></div>`;
    else if(day.weatherDelay) actCol = `<div class="col actual"><div class="col-title">📡 实际</div><div class="pending">☁️ 天气延误 · 未行进</div></div>`;
    else actCol = `<div class="col actual"><div class="col-title">📡 实际</div><div class="pending">⏳ 等待 GPS 轨迹上传</div></div>`;
  } else {
    const a = day.actual;
    const endMismatch = a.actTo && day.to && a.actTo!==day.to;
    actCol = `
      <div class="col actual">
        <div class="col-title">📡 实际</div>
        <div class="row"><span class="k">日期</span><span class="v">${a.date?shortYmd(a.date):'—'}</span></div>
        <div class="row" style="align-items:flex-start;"><span class="k">路线</span><span class="v route">${esc(a.actFrom)}<span class="arrow">→</span>${esc(a.actTo)}</span></div>
        <div class="row"><span class="k">距离</span><span class="v">${a.distance.toFixed(1)}km</span></div>
        <div class="row"><span class="k">爬升</span><span class="v">${(+a.elevGain||0).toLocaleString()}m</span></div>
        <div class="row"><span class="k">用时</span><span class="v">${a.durationStr||'—'}${a.avgSpeed?` · ${a.avgSpeed}km/h`:''}</span></div>
        <div class="row"><span class="k">文件</span><span class="v" style="font-size:11px;color:var(--text-dim);">${esc(a.file)}</span></div>
        ${endMismatch?`<div class="mismatch">⚠️ 实际终点≠计划终点（只走了一部分/路线有偏差）</div>`:''}
      </div>`;
  }

  // 对比条（仅在有实际数据时显示）
  let cmp = '';
  if(day.actual){
    const planV = +day.plannedDistance||0, actV = +day.actual.distance||0;
    cmp = `
      <div class="cmp">
        <div class="cmp-head">
          <span class="lbl">距离对比（计划 vs 实际）</span>
          <span>差值 ${deltaTag(planV,actV)} km</span>
        </div>
        ${cmpBars(planV, actV)}
      </div>`;
  }

  return `
    <article class="${cls.join(' ')}" data-day="${day.day}">
      <div class="day-head">
        <span class="day-badge"><span class="dot" style="background:${color}"></span><span class="num">Day ${day.day}</span></span>
        <span class="sec-name">第 <b>${day.sectionId}</b> 段 · ${esc(secName)}</span>
        ${isToday?'<span class="chip today">今天</span>':''}
        ${statusChip}
      </div>
      <div class="cols">${planCol}${actCol}</div>
      ${cmp}
    </article>`;
}

function render(){
  const data = buildDays();
  const summaryEl = document.getElementById('summary');
  const listEl = document.getElementById('list');
  const countEl = document.getElementById('countNote');
  const footEl = document.getElementById('footNote');

  if(!data.planned.length){
    summaryEl.innerHTML = '';
    listEl.innerHTML = `
      <div class="empty">
        <div class="ico">🗺️</div>
        <h2>尚未生成行程安排</h2>
        <p>行程会根据<b>真实的预设轨迹（GPX 分段）</b>自动生成。<br>
        请先在 <a href="index.html">地图追踪页</a> 导入预设轨迹，或上传实际徒步 GPS 文件。<br>
        <span style="color:var(--text-dim);">本页读取与地图页相同的本地数据，不会凭空生成占位计划。</span></p>
      </div>`;
    countEl.textContent = '';
    footEl.textContent = '';
    return;
  }

  summaryEl.innerHTML = renderSummary(data);

  let days = data.planned.slice();
  if(STATE.filter==='done') days = days.filter(d=>d.actual);
  else if(STATE.filter==='todo') days = days.filter(d=>!d.actual);
  days.sort((a,b)=> STATE.sort==='asc' ? a.day-b.day : b.day-a.day);

  listEl.innerHTML = days.map(d=>dayCard(d,data)).join('');
  countEl.textContent = `显示 ${days.length} / ${data.planned.length} 天` + (data.unmatched.length?` · ⚠️ ${data.unmatched.length} 个轨迹无法匹配到日程`:'');

  const startPlace = loadRaw(LS.startPlace);
  footEl.innerHTML = `数据来源：本浏览器本地存储（与地图页共享）。` +
    (data.startDate?` 出发日期：<code>${esc(data.startDate)}</code>。`:' 未设置出发日期（日程日期显示为「—」）。') +
    ` 在地图页上传/编辑后，刷新本页即可同步。`;
}

/* ── 工具栏事件 ── */
document.getElementById('segSort').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  STATE.sort=b.dataset.sort;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle('active',x===b));
  render();
});
document.getElementById('segFilter').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  STATE.filter=b.dataset.filter;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle('active',x===b));
  render();
});

/* 跨标签页同步：地图页更新后本页自动刷新 */
window.addEventListener('storage', e=>{
  if([LS.itinerary,LS.actual,LS.start,LS.preset].includes(e.key)) render();
});

render();
</script>
</body>
</html>
