<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>路段探索器 · 方案C 预览</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel-bg:rgba(22,27,34,0.92);
    --accent:#58a6ff; --text:#e6edf3; --text-dim:#8b949e;
    --border:rgba(255,255,255,0.08); --green:#3fb950; --red:#f85149;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
       background:var(--bg); color:var(--text); height:100vh; display:flex; overflow:hidden;}
  /* 左侧：模拟地图 */
  .map-mock{flex:1; position:relative; background:
      radial-gradient(circle at 30% 40%, #1b2735 0%, #0d1117 70%);}
  .map-mock::before{content:""; position:absolute; inset:0;
      background-image:linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px),
                       linear-gradient(90deg,rgba(255,255,255,0.04) 1px,transparent 1px);
      background-size:40px 40px;}
  .map-label{position:absolute; top:16px; left:16px; background:var(--panel-bg);
      border:1px solid var(--border); border-radius:8px; padding:10px 14px; font-size:13px;}
  .map-label b{color:var(--accent);}
  .map-pin{position:absolute; left:50%; top:50%; transform:translate(-50%,-100%);
      font-size:34px; transition:all .5s cubic-bezier(.34,1.56,.64,1); filter:drop-shadow(0 4px 6px rgba(0,0,0,.5));}
  .map-hint{position:absolute; bottom:16px; left:16px; right:16px; font-size:11px; color:var(--text-dim);
      background:var(--panel-bg); border:1px solid var(--border); border-radius:8px; padding:8px 12px;}
  /* 右侧：路段探索器面板 */
  .panel{width:360px; background:var(--panel); border-left:1px solid var(--border);
      display:flex; flex-direction:column;}
  .panel-header{padding:16px; border-bottom:1px solid var(--border);}
  .panel-header h3{margin:0; font-size:15px;}
  .panel-header .sub{font-size:11px; color:var(--text-dim); margin-top:4px;}
  .panel-body{flex:1; overflow-y:auto; padding:14px;}
  .panel-body::-webkit-scrollbar{width:5px;}
  .panel-body::-webkit-scrollbar-thumb{background:var(--border); border-radius:3px;}
  .sec-card{background:var(--bg); border-left:3px solid #888; border-radius:0 10px 10px 0;
      margin-bottom:12px; overflow:hidden; cursor:pointer; transition:transform .15s, box-shadow .15s;}
  .sec-card:hover{transform:translateX(2px);}
  .sec-card.active{box-shadow:0 0 0 1px var(--accent), 0 6px 18px rgba(88,166,255,.18);}
  .sec-head{display:flex; align-items:center; gap:8px; padding:12px 14px 10px;}
  .sec-title{font-weight:600; font-size:13px; flex:1;}
  .sec-title small{display:block; font-weight:400; font-size:11px; color:var(--text-dim);}
  .sec-meta{font-size:11px; color:var(--text-dim); text-align:right; line-height:1.6;}
  .sec-bar{height:4px; background:rgba(255,255,255,.08); margin:0 14px 10px; border-radius:2px; overflow:hidden;}
  .sec-bar>i{display:block; height:100%;}
  .sec-detail{max-height:0; overflow:hidden; transition:max-height .35s ease; padding:0 14px;}
  .sec-card.active .sec-detail{max-height:420px; padding-bottom:14px;}
  .elev-box{background:rgba(255,255,255,.03); border-radius:8px; padding:8px; margin-bottom:10px;}
  .elev-box .cap{font-size:10px; color:var(--text-dim); margin-bottom:4px;}
  .wp-row{display:flex; align-items:center; gap:8px; padding:6px 0; font-size:12px;
      border-top:1px solid var(--border);}
  .wp-ico{width:18px; text-align:center;}
  .wp-name{flex:1;}
  .wp-elev{color:var(--text-dim); font-size:11px;}
  .tag{font-size:10px; padding:1px 6px; border-radius:6px; margin-left:6px;}
  .tag.pass{background:rgba(248,81,73,.15); color:var(--red);}
  .tag.camp{background:rgba(63,185,80,.15); color:var(--green);}
</style>
</head>
<body>
  <div class="map-mock">
    <div class="map-label">🗺️ 地图焦点：<b id="focusName">— 未选择 —</b></div>
    <div class="map-pin" id="mapPin">📍</div>
    <div class="map-hint">在右侧点击任意「路段卡片」，地图上的 📍 会移动到该段代表位置，模拟「点击→地图聚焦」。</div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <h3>🏔️ 路段探索器 <span style="font-size:11px;color:var(--accent)">方案 C 预览</span></h3>
      <div class="sub">每段：高程剖面 + 该段营地/垭口（来自预设轨迹 wpt）+ 点击聚焦地图</div>
    </div>
    <div class="panel-body" id="panelBody"></div>
  </div>

<script>
const sections = [
  { id:3, nameEn:'Khumbu / Everest', nameZh:'昆布 · 珠峰', color:'#e07b39',
    status:'in-progress', plannedKm:182, actualKm:120, coverage:0.66,
    elev:[2820,3440,4200,5360,4200,4410,5535,5164,3400],
    passes:[{n:'Renjo La',e:5360},{n:'Cho La',e:5420},{n:'Kongma La',e:5535}],
    camps:[{n:'Namche Bazaar',e:3440},{n:'Dingboche',e:4410},{n:'Gorak Shep',e:5164}] },
  { id:7, nameEn:'Mustang', nameZh:'木斯塘', color:'#3fb950',
    status:'upcoming', plannedKm:210, actualKm:0, coverage:0,
    elev:[2700,2743,2800,3800,3840,3700],
    passes:[{n:'Dhampus Pass',e:5390}],
    camps:[{n:'Jomsom',e:2743},{n:'Kagbeni',e:2800},{n:'Lo Manthang',e:3840}] },
  { id:10, nameEn:'Humla', nameZh:'胡姆拉', color:'#8957e3',
    status:'upcoming', plannedKm:165, actualKm:0, coverage:0,
    elev:[2900,2910,3500,3400],
    passes:[],
    camps:[{n:'Simikot',e:2910},{n:'Kermi',e:3200}] },
];

const statusIcon = s => s==='completed' ? '✅' : s==='in-progress' ? '🔵' : '⚪';

// 由海拔数组生成 SVG 高程剖面
function elevSVG(elev, color){
  const W=320,H=64,pad=4;
  const min=Math.min(...elev), max=Math.max(...elev), span=(max-min)||1;
  const pts=elev.map((e,i)=>{
    const x=pad+(W-2*pad)*i/(elev.length-1);
    const y=H-pad-(H-2*pad)*(e-min)/span;
    return x.toFixed(1)+','+y.toFixed(1);
  }).join(' ');
  const area=`${pad},${H-pad} ${pts} ${W-pad},${H-pad}`;
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block">
    <polygon points="${area}" fill="${color}22"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2"
      stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function render(){
  const body=document.getElementById('panelBody');
  body.innerHTML = sections.map(s=>{
    const c=elevSVG(s.elev, s.color);
    const wps=[...s.passes.map(p=>({...p,t:'pass'})), ...s.camps.map(p=>({...p,t:'camp'}))]
      .sort((a,b)=>b.e-a.e);
    const wpRows=wps.map(w=>`<div class="wp-row">
        <div class="wp-ico">${w.t==='pass'?'⛰️':'🏕️'}</div>
        <div class="wp-name">${w.n}<span class="tag ${w.t}">${w.t==='pass'?'垭口':'营地'}</span></div>
        <div class="wp-elev">${w.e.toLocaleString()}m</div>
      </div>`).join('');
    const pct=Math.round(s.coverage*100);
    return `<div class="sec-card" data-id="${s.id}" style="border-left-color:${s.color}"
        onclick="selectSec(${s.id})">
      <div class="sec-head">
        <div class="sec-title">${statusIcon(s.status)} ${s.nameEn}
          <small>${s.nameZh}</small></div>
        <div class="sec-meta">计划 ${s.plannedKm}km<br>已走 ${s.actualKm}km</div>
      </div>
      <div class="sec-bar"><i style="width:${pct}%;background:${s.color}"></i></div>
      <div class="sec-detail">
        <div class="elev-box"><div class="cap">📈 高程剖面（最高点 ${Math.max(...s.elev).toLocaleString()}m）</div>${c}</div>
        ${wpRows}
      </div>
    </div>`;
  }).join('');
}

// 模拟「点击→地图聚焦」
function selectSec(id){
  document.querySelectorAll('.sec-card').forEach(c=>c.classList.remove('active'));
  const card=document.querySelector(`.sec-card[data-id="${id}"]`);
  card.classList.add('active');
  const s=sections.find(x=>x.id===id);
  document.getElementById('focusName').textContent=`第${s.id}段 · ${s.nameZh}`;
  const pin=document.getElementById('mapPin');
  // 伪随机但稳定的代表位置
  const pos={3:[34,38],7:[62,30],10:[78,58]}[id];
  pin.style.left=pos[0]+'%'; pin.style.top=pos[1]+'%';
  pin.style.filter=`drop-shadow(0 0 10px ${s.color})`;
}

render();
</script>
</body>
</html>
