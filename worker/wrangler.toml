# Cloudflare Worker 配置（CLI 部署用；Dashboard 粘贴可忽略此文件）
# 部署：在 worker/ 目录执行  wrangler deploy
# 环境变量请用 secret 设置（不要明文写这里）：
#   wrangler secret put ADMIN_PWD
#   wrangler secret put SECRET

name = "ght"
main = "index.js"
compatibility_date = "2024-09-23"

# KV 命名空间：先在 Cloudflare 后台建一个 KV，把它的 ID 填到下面
kv_namespaces = [
  { binding = "GHT", id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID" }
]
