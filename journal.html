<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="ght-api" content="https://ght.gjt6nrf4jz.workers.dev">
<title>GHT 远征日志 · 时间线</title>
<script src="sections-data.js"></script>
<script src="lang.js"></script>
<style>
  :root{
    --bg:#0a0d12; --bg-soft:#0f141d; --panel:rgba(255,255,255,.035);
    --panel-2:rgba(255,255,255,.055); --border:rgba(255,255,255,.09);
    --text:#e6edf3; --text-dim:#8b98a8; --text-faint:#5b6675;
    --accent:#4f9dff; --accent-soft:#1b3a5c;
    --green:#34d058; --orange:#ffa94d; --gold:#FFCE6B;
    --r:14px; --r-sm:9px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Inter,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(79,157,255,.10), transparent 60%),
      radial-gradient(900px 500px at -5% 10%, rgba(177,49,159,.07), transparent 55%),
      var(--bg);
    min-height:100vh;
  }

  /* 顶栏 */
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:16px;
    padding:12px 22px;background:rgba(10,13,18,.72);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border)}
  .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;letter-spacing:.3px;flex:none}
  .brand .logo{width:24px;height:24px;border-radius:7px;
    background:linear-gradient(135deg,var(--accent),#9b6cff);display:grid;place-items:center;font-size:13px}
  .brand .sub{font-weight:400;font-size:11px;color:var(--text-dim);letter-spacing:1px}
  .topbar .spacer{flex:1}
  .backbtn{margin-left:auto;font-size:12.5px;color:var(--text);background:var(--panel-2);border:1px solid var(--border);
    border-radius:8px;padding:7px 13px;text-decoration:none;cursor:pointer;transition:.18s;white-space:nowrap}
  .backbtn:hover{color:#fff;border-color:rgba(255,255,255,.22)}
  .lang-btn{margin-left:14px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-family:inherit;
    background:var(--panel-2);color:var(--text);border:1px solid var(--border);
    border-radius:8px;padding:7px 13px;font-size:12px;transition:.18s;white-space:nowrap}
  .lang-btn:hover{color:#fff;border-color:rgba(255,255,255,.22)}

  /* 页头 */
  .page-head{max-width:920px;margin:0 auto;padding:30px 22px 6px}
  .page-head h1{font-size:27px;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;gap:11px}
  .page-head .en{font-size:12px;font-weight:600;color:var(--text-faint);letter-spacing:3px;margin-top:3px}
  .page-head p.sub{color:var(--text-dim);font-size:13px;margin-top:10px;max-width:660px}

  /* 统计条 */
  .stats{max-width:920px;margin:18px auto 4px;padding:0 22px;
    display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:var(--r-sm);padding:13px 15px}
  .stat .v{font-size:20px;font-weight:800;letter-spacing:.3px}
  .stat .v small{font-size:11px;font-weight:600;color:var(--text-dim);margin-left:2px}
  .stat .k{font-size:11px;color:var(--text-dim);margin-top:3px}
  .stat .v.green{color:var(--green)} .stat .v.gold{color:var(--gold)} .stat .v.accent{color:var(--accent)}

  /* 筛选 */
  .filters{max-width:920px;margin:20px auto 4px;padding:0 22px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .chip{padding:7px 14px;border-radius:20px;font-size:12.5px;border:1px solid var(--border);
    background:var(--panel);color:var(--text-dim);cursor:pointer;transition:.18s;user-select:none}
  .chip:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .filters .spacer{flex:1}
  .filters .hint{font-size:11px;color:var(--text-faint)}

  /* 信息流（平铺，不再按路段分组） */
  .feed{max-width:920px;margin:8px auto 50px;padding:18px 22px 0}
  .entry{margin-bottom:14px}
  .entry:last-child{margin-bottom:0}

  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:15px 17px;transition:.2s;overflow:hidden}
  .card:hover{border-color:rgba(255,255,255,.18);background:var(--panel-2)}
  .card-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:9px}
  .date{font-size:12.5px;color:var(--text-dim);font-weight:600}
  .day-badge{font-size:11px;color:var(--text-faint);background:rgba(255,255,255,.05);
    border:1px solid var(--border);border-radius:6px;padding:2px 8px}
  .gps-badge{font-size:11px;color:var(--green);background:rgba(52,208,88,.1);
    border:1px solid rgba(52,208,88,.3);border-radius:7px;padding:3px 9px;font-weight:600}

  .note{font-size:13.5px;color:var(--text);line-height:1.7;margin:2px 0 12px;white-space:pre-wrap;word-break:break-word}
  .note.dim{color:var(--text-dim)}

  /* GPS 统计 chips */
  .chips{display:flex;gap:9px;flex-wrap:wrap;margin:4px 0 10px}
  .sc{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:8px 11px;min-width:72px}
  .sc .sv{font-size:15px;font-weight:800;letter-spacing:.2px}
  .sc .sv.green{color:var(--green)} .sc .sv.orange{color:var(--orange)} .sc .sv.white{color:var(--text)}
  .sc .sv small{font-size:10px;font-weight:500;color:var(--text-dim);margin-left:1px}
  .sc .sk{font-size:10.5px;color:var(--text-dim);margin-top:2px}

  /* 高程迷你折线 */
  .spark{margin-top:4px;width:100%;height:54px;display:block;border-radius:8px;
    background:linear-gradient(180deg,rgba(79,157,255,.06),transparent);border:1px solid var(--border)}

  .empty{text-align:center;color:var(--text-dim);padding:64px 20px;font-size:14px;line-height:1.8}
  .empty a{color:var(--accent);text-decoration:none}

  /* 删除按钮 + 密码确认弹窗 */
  .ct-right{margin-left:auto;display:flex;align-items:center;gap:8px}
  .del-btn{background:var(--bg-soft);border:1px solid var(--border);color:var(--text-dim);
    border-radius:7px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:13px;line-height:1;transition:.18s;padding:0}
  .del-btn:hover{color:var(--orange);border-color:var(--orange);background:rgba(255,120,40,.08)}
  .modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
    display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
  .modal-mask[hidden]{display:none}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
    max-width:380px;width:100%;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .modal h3{margin:0 0 8px;font-size:16px;color:var(--text)}
  .modal p{margin:0 0 16px;font-size:13px;color:var(--text-dim);line-height:1.6}
  .modal .j-pwd{margin-bottom:8px}
  .modal-actions{display:flex;gap:10px;margin-top:6px}
  .btn-cancel{flex:1;padding:9px;background:var(--bg-soft);border:1px solid var(--border);
    color:var(--text);border-radius:8px;font-size:13px;cursor:pointer;transition:.18s}
  .btn-cancel:hover{border-color:var(--text-dim)}
  .btn-del{flex:1;padding:9px;background:var(--orange);border:none;color:#fff;
    border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.18s}
  .btn-del:hover{filter:brightness(1.1)}

  /* 发布框（仅主人可见） */
  .composer{max-width:920px;margin:14px auto 0;padding:0 22px}
  .composer-box{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px}
  .composer-box label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:6px}
  .composer-box select,.composer-box textarea{width:100%;background:var(--bg-soft);border:1px solid var(--border);
    border-radius:8px;color:var(--text);padding:8px 10px;font-family:inherit;font-size:13px;box-sizing:border-box}
  .composer-box select{margin-bottom:8px}
  .composer-box textarea{resize:vertical;min-height:64px;line-height:1.6}
  .composer-box .btn-pub{margin-top:10px;width:100%;padding:10px;background:var(--accent);color:#fff;
    border:none;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.18s}
  .composer-box .btn-pub:hover{filter:brightness(1.12)}
  .owner-note{max-width:920px;margin:18px auto 0;padding:0 22px;text-align:center;
    color:var(--text-dim);font-size:12.5px}
  .owner-note a{color:var(--accent);text-decoration:none}
  .composer-box input.j-pwd{width:100%;background:var(--bg-soft);border:1px solid var(--border);
    border-radius:8px;color:var(--text);padding:8px 10px;font-family:inherit;font-size:13px;box-sizing:border-box;margin-bottom:8px}
  .j-pwd-err{color:var(--orange);font-size:12px;margin-top:8px}

  @media(max-width:680px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .page-head h1{font-size:22px}
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <span class="logo">🏔️</span>
      <span>GHT <span class="sub" data-i18n="brand.sub">大喜马拉雅高线</span></span>
    </div>
    <a class="backbtn" href="index.html" data-i18n="jo.back">← 回主页</a>
    <button class="lang-btn" type="button">Language ▾</button>
  </div>

  <div class="page-head">
    <h1 data-i18n="jo.title">📝 远征日志</h1>
    <div class="en" data-i18n="jo.en">JOURNAL · 时间线 · 最新在前</div>
    <p class="sub" data-i18n="jo.sub">从 Phungling 到 Darchula 的全程纪实。沿途随笔按时间倒序排列，最新发布在最上方。山里信号不稳，只发文字、不传照片。</p>
  </div>

  <div class="stats" id="stats">
    <div class="stat"><div class="v" id="st-total">0<small>篇</small></div><div class="k" data-i18n="jo.total">总日志</div></div>
    <div class="stat"><div class="v green" id="st-dist">0<small>km</small></div><div class="k" data-i18n="jo.dist">已记录里程</div></div>
    <div class="stat"><div class="v gold" id="st-gain">0<small>km</small></div><div class="k" data-i18n="jo.gain">累计爬升</div></div>
    <div class="stat"><div class="v accent" id="st-sec">0<small>段</small></div><div class="k" data-i18n="jo.sec">覆盖路段</div></div>
  </div>

  <div class="filters">
    <span class="chip active" data-filter="all" data-i18n="jo.f.all">全部</span>
    <span class="chip" data-filter="text" data-i18n="jo.f.text">✍️ 手写随笔</span>
    <span class="spacer"></span>
    <span class="hint" data-i18n="jo.f.newest">最新在前</span>
  </div>

  <div class="composer" id="composer"></div>

  <div class="feed" id="feed"></div>

  <!-- 删除确认弹窗：需输入主人密码 -->
  <div class="modal-mask" id="delModal" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <h3 id="delTitle"></h3>
      <p id="delDesc"></p>
      <input type="password" id="delPwd" class="j-pwd" placeholder="" autocomplete="off" onkeydown="if(event.key==='Enter')doDelete()">
      <div class="j-pwd-err" id="delErr" hidden></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="delCancel" type="button"></button>
        <button class="btn-del" id="delConfirm" type="button" onclick="doDelete()"></button>
      </div>
    </div>
  </div>

<script>
  const t = window.GHTI18N.t;
  // ── 路段元数据（来自 sections-data.js 的 window.GHT_SECTIONS）──
  const SECTIONS = (window.GHT_SECTIONS || []).map((r, i) => ({
    num: i + 1, id: r.id, zh: r.zh || r.en || ('第' + (i + 1) + '段'),
    en: r.en || '', color: r.color || '#888'
  }));

  // 主人态：与首页共享 localStorage 中的 token（首页密码解锁后，本页即时可见/可发布）
  const NEPAL_OFFSET_MS = (5 * 60 + 45) * 60 * 1000;
  const TOKEN_KEY = 'ght_token';
  const MASTER_PWD = 'ght2026';   // 本地无后端时的主密码兜底（与 Worker 端一致）
  function getOwnerToken() { try { return localStorage.getItem(TOKEN_KEY) || ''; } catch (e) { return ''; } }
  function setOwnerToken(t) { try { if (t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); } catch (e) {} }
  function apiBase() { const m = document.querySelector('meta[name="ght-api"]'); return (m && m.getAttribute('content') || '').trim().replace(/\/+$/, ''); }
  function hasBackend() { return !!apiBase(); }
  // ── 全量共享（服务端 share:all：主人写入 / 所有人读取）──
  let sharedCache = null;
  function authHeader() { const t = getOwnerToken(); return t ? { 'Authorization': 'Bearer ' + t } : {}; }
  async function getShare() {
    if (!hasBackend()) return null;
    try {
      const res = await fetch(apiBase() + '/api/share', { method: 'GET' });
      let d = null; try { d = await res.json(); } catch (e) {}
      if (d && d.ok && d.data) return d.data;
      return null;
    } catch (e) { return null; }
  }
  async function putShare(bundle) {
    if (!hasBackend()) return;
    try {
      await fetch(apiBase() + '/api/share', { method: 'PUT', headers: Object.assign({ 'Content-Type': 'application/json' }, authHeader()), body: JSON.stringify(bundle) });
    } catch (e) { console.warn('[ght] 日志共享推送失败', e); }
  }
  function pushJournalShare() {
    if (!getOwnerToken()) return;            // 仅主人可写
    // 墓碑 = 云端已有 deletedIds ∪ 本机本地删除集合，确保删除在其他设备不复活
    const deleted = new Set([...(sharedCache && sharedCache.deletedIds || []), ...localDeletedIds]);
    const journal = mergeJournal(logEntries, sharedCache ? sharedCache.journal : null, deleted);
    const bundle = (sharedCache && typeof sharedCache === 'object') ? JSON.parse(JSON.stringify(sharedCache)) : {};
    bundle.journal = journal;                // 合并后的 journal 分片，继承其余字段
    bundle.deletedIds = [...deleted];        // 墓碑随包上云，永不过期
    delete bundle.clearedAt;                 // 真实写入即摘掉「已清空」标记，恢复为正常 bundle
    sharedCache = bundle;
    try { localStorage.removeItem('ght_cleared_self'); } catch (e) {}  // 任何一次推送代表已恢复共享
    putShare(bundle);
  }
  async function loadSharedJournal() {
    if (!hasBackend()) return;
    const b = await getShare();
    // 服务端收到「已清空」包：其他设备以空为准抹掉本地日志；发起方（ght_cleared_self）保留本机
    if (b && b.clearedAt) {
      if (!localStorage.getItem('ght_cleared_self')) {
        logEntries = []; localDeletedIds = new Set(); saveLogEntries();
      }
      sharedCache = b;
      renderStats();
      renderFeed('all');
      return;
    }
    if (b) {
      sharedCache = b;
      // 合并云端而非整段覆盖：以 id 归并，最新 updatedAt 胜出，排除墓碑 id
      const deleted = new Set(b.deletedIds || []);
      logEntries = mergeJournal(logEntries, b.journal || [], deleted);
      saveLogEntries();                       // 写回本地，使首页 app.js 也能读到
      renderStats();
      renderFeed(document.querySelector('.filters .chip.active')?.dataset.filter || 'all');
    }
    // 服务端无日志共享内容：主人且本机有日志 → 自动种入 KV（无需手动发布一次）
    else if (getOwnerToken() && logEntries && logEntries.length) {
      pushJournalShare();
    }
  }
  // 解锁：有后端走 /api/login；无后端（本地预览）用主密码兜底，使离线也能测试发布
  async function journalLogin(pwd) {
    if (hasBackend()) {
      try {
        const res = await fetch(apiBase() + '/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pwd }) });
        let data = null; try { data = await res.json(); } catch (e) {}
        // 以服务端返回的 data.ok 为准，并正确透传错误（含 SECRET 缺失）
        if (data && data.ok && data.token) return { ok: true, token: data.token };
        const msg = (data && data.message) ? data.message : '密码错误';
        return { ok: false, msg };
      } catch (e) { return { ok: false, msg: '无法连接服务器（后端未启动？）' }; }
    }
    if (pwd && pwd === MASTER_PWD) return { ok: true, token: 'local-' + Date.now() };
    return { ok: false, msg: '密码错误' };
  }

  // ── 日志合并（按 id 归并，最新 updatedAt 胜出；deletedIds 为墓碑，永不复活）──
  let localDeletedIds = new Set();
  function genId() { return 'le_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
  function mergeJournal(local, remote, deletedIds) {
    const deleted = new Set(deletedIds || []);
    const m = new Map();
    (remote || []).forEach(e => { if (e && e.id && !deleted.has(e.id)) m.set(e.id, e); }); // 不动 remote 原对象
    (local || []).forEach(e => {
      if (!e) return;
      if (deleted.has(e.id)) return;           // 墓碑：即便本机仍有该条目也排除
      if (!e.id) e.id = genId();               // 补稳定 id（旧条目）
      if (!e.updatedAt) e.updatedAt = 0;       // 旧条目视为最旧，id 冲突时让云端赢
      const cur = m.get(e.id);
      if (!cur || e.updatedAt >= cur.updatedAt) m.set(e.id, e);
    });
    return Array.from(m.values()).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  }

  let logEntries = [];
  const actualByDate = {};   // date -> { dayNum, points:[{elev}] }

  function load() {
    try {
      const raw = JSON.parse(localStorage.getItem('ght_log') || '[]');
      if (Array.isArray(raw)) logEntries = raw;
    } catch (e) {}
    try {
      const acts = JSON.parse(localStorage.getItem('ght_actual') || '[]');
      if (Array.isArray(acts)) acts.forEach(t => {
        const d = t.date || (t.dailyStats && t.dailyStats.date);
        if (d) actualByDate[d] = { dayNum: t.dayNum, points: t.trackPoints || [] };
      });
    } catch (e) {}
    // 给缺 id 的条目补上稳定 id（删除时按 id 精确定位，避免按文本/日期误删）
    let needSave = false;
    logEntries.forEach((e, i) => {
      if (!e.id) { e.id = 'le_' + Date.now().toString(36) + '_' + i; needSave = true; }
    });
    if (needSave) saveLogEntries();
    // 新 → 旧
    logEntries.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  }

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));
  }

  // 真实高程迷你折线（取自该日实际轨迹的 elev 字段，无数据则返回空）
  function sparkline(points, color) {
    const pts = (points || []).filter(p => p && typeof p.elev === 'number' && !isNaN(p.elev));
    if (pts.length < 2) return '';
    const step = Math.max(1, Math.floor(pts.length / 80));
    const sampled = [];
    for (let i = 0; i < pts.length; i += step) sampled.push(pts[i]);
    if (sampled[sampled.length - 1] !== pts[pts.length - 1]) sampled.push(pts[pts.length - 1]);
    let min = Infinity, max = -Infinity;
    sampled.forEach(p => { if (p.elev < min) min = p.elev; if (p.elev > max) max = p.elev; });
    const W = 600, H = 54, pad = 6, span = (max - min) || 1;
    const d = sampled.map((p, i) => {
      const x = (i / (sampled.length - 1)) * W;
      const y = H - pad - ((p.elev - min) / span) * (H - 2 * pad);
      return (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1);
    }).join(' ');
    return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">`
      + `<path d="${d}" fill="none" stroke="${color}" stroke-width="2" opacity=".9"/></svg>`;
  }

  function entryCard(e, region) {
    const isGps = !!e.dailyStats;
    const ds = e.dailyStats || {};
    const meta = actualByDate[e.date] || {};
    const dayNum = e.dayNum || meta.dayNum;

    let gpsBadge = '';
    if (isGps) {
      const st = ds.startTime ? new Date(ds.startTime).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '';
      const et = ds.endTime ? new Date(ds.endTime).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '';
      gpsBadge = `<span class="gps-badge">📡 自动记录${st && et ? ' · ' + st + ' → ' + et : ''}</span>`;
    }

    let chips = '';
    if (isGps) {
      chips = `<div class="chips">`
        + `<div class="sc"><div class="sv white">${(ds.distance || 0).toFixed(1)}<small>km</small></div><div class="sk">距离</div></div>`
        + `<div class="sc"><div class="sv orange">${(ds.elevGain || 0).toLocaleString()}<small>m</small></div><div class="sk">爬升</div></div>`
        + `<div class="sc"><div class="sv orange">${(ds.elevLoss || 0).toLocaleString()}<small>m</small></div><div class="sk">下降</div></div>`
        + (ds.durationStr ? `<div class="sc"><div class="sv white">${ds.durationStr}</div><div class="sk">用时</div></div>` : '')
        + (ds.avgSpeed ? `<div class="sc"><div class="sv white">${ds.avgSpeed}<small>km/h</small></div><div class="sk">均速</div></div>` : '')
        + `<div class="sc"><div class="sv white">${(ds.maxElev || 0).toLocaleString()}<small>m</small></div><div class="sk">最高</div></div>`
        + `</div>`;
    }
    const spark = isGps ? sparkline(meta.points, region.color) : '';
    const dayBadge = dayNum ? `<span class="day-badge">Day ${dayNum}</span>` : '';
    // 仅主人态显示删除按钮；点击后弹密码确认框
    const owner = !!getOwnerToken();
    const delBtn = owner ? `<button class="del-btn" type="button" data-id="${escapeHtml(e.id || '')}" title="${t('jo.del.btn')}" aria-label="${t('jo.del.btn')}">🗑</button>` : '';

    return `<div class="entry" data-type="${isGps ? 'gps' : 'text'}">
      <div class="card">
        <div class="card-top">
          <span class="date">${escapeHtml(e.date || '—')}</span>
          ${dayBadge}
          <span class="ct-right">${gpsBadge}${delBtn}</span>
        </div>
        <div class="note${isGps ? ' dim' : ''}">${escapeHtml(e.text || '')}</div>
        ${chips}${spark}
      </div>
    </div>`;
  }

  function renderFeed(filter) {
    const feed = document.getElementById('feed');
    const pass = (e) => filter === 'all' || (filter === 'text' ? !e.dailyStats : !!e.dailyStats);
    const shown = logEntries.filter(pass);
    if (!shown.length) {
      feed.innerHTML = '<div class="empty">' + t('jo.empty') + '</div>';
      return;
    }
    // 平铺：新 → 旧（load() 已按日期倒序），不再按路段分组
    feed.innerHTML = shown.map(e => entryCard(e, { color: 'var(--accent)' })).join('');
    // 删除按钮用事件委托绑定（避免内联 onclick 的字符串参数转义坑）
    feed.querySelectorAll('.del-btn').forEach(b => {
      b.addEventListener('click', () => confirmDelete(b.dataset.id));
    });
  }

  function renderStats() {
    let dist = 0, gain = 0;
    const covered = new Set();
    logEntries.forEach(e => {
      if (e.dailyStats) {
        dist += e.dailyStats.distance || 0;
        gain += e.dailyStats.elevGain || 0;
      }
      if (e.sectionId && e.sectionId >= 1 && e.sectionId <= SECTIONS.length) covered.add(e.sectionId);
    });
    document.getElementById('st-total').innerHTML = logEntries.length + '<small>篇</small>';
    document.getElementById('st-dist').innerHTML = Math.round(dist).toLocaleString() + '<small>km</small>';
    document.getElementById('st-gain').innerHTML = (gain / 1000).toFixed(1) + '<small>k m</small>';
    document.getElementById('st-sec').innerHTML = covered.size + '<small>段</small>';
  }

  // ── 发布框（主人态显示；从首页迁移而来，原在 index.html 的 renderLog 内）──
  function fmtNepalDate(d) {
    const dt = (d instanceof Date) ? d : new Date(d);
    if (isNaN(dt.getTime())) return null;
    const nepal = new Date(dt.getTime() + NEPAL_OFFSET_MS);
    const y = nepal.getUTCFullYear();
    const m = String(nepal.getUTCMonth() + 1).padStart(2, '0');
    const day = String(nepal.getUTCDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }

  function saveLogEntries() {
    try { localStorage.setItem('ght_log', JSON.stringify(logEntries)); } catch (e) {}
  }

  function renderComposer() {
    const box = document.getElementById('composer');
    if (!box) return;
    if (!getOwnerToken()) {
      box.innerHTML = `
        <div class="composer-box">
          <label>${t('jo.unlock.label')}</label>
          <input type="password" id="jPwd" class="j-pwd" placeholder="${t('jo.unlock.pwd')}" autocomplete="off" onkeydown="if(event.key==='Enter')unlockJournal()">
          <button class="btn-pub" id="jUnlock">${t('jo.unlock.btn')}</button>
          <div class="j-pwd-err" id="jPwdErr" hidden></div>
        </div>`;
      const ub = document.getElementById('jUnlock');
      if (ub) ub.addEventListener('click', unlockJournal);
      return;
    }
    box.innerHTML = `
      <div class="composer-box">
        <textarea id="jText" rows="3" placeholder="${t('jo.composer.ph')}"></textarea>
        <button class="btn-pub" id="jPub">${t('jo.composer.btn')}</button>
        <button class="btn-pub" id="jRepublish" style="margin-top:8px;background:#3a7;" onclick="republishJournalShare()">🔄 重新发布共享</button>
      </div>`;
    const btn = document.getElementById('jPub');
    if (btn) btn.addEventListener('click', addLogEntry);
    const rb = document.getElementById('jRepublish');
    if (rb) rb.addEventListener('click', republishJournalShare);
  }

  // 在日志页直接解锁（不再需要跳回首页）
  async function unlockJournal() {
    const pi = document.getElementById('jPwd');
    if (!pi) return;
    const pwd = pi.value;
    if (!pwd) return;
    const err = document.getElementById('jPwdErr');
    if (err) err.hidden = true;
    const r = await journalLogin(pwd);
    if (r.ok) { setOwnerToken(r.token); renderComposer(); }
    else if (err) { err.hidden = false; err.textContent = r.msg || t('jo.unlock.err'); }
  }

  function addLogEntry() {
    if (!getOwnerToken()) { renderComposer(); return; }
    const ta = document.getElementById('jText');
    const text = (ta ? ta.value : '').trim();
    if (!text) return;
    const today = fmtNepalDate(new Date());
    const entry = { id: 'le_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6), date: today, text, updatedAt: Date.now() };
    logEntries.push(entry);
    logEntries.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    saveLogEntries();
    pushJournalShare();   // 日志发布同步到共享包
    if (ta) ta.value = '';
    renderStats();
    renderFeed(document.querySelector('.filters .chip.active')?.dataset.filter || 'all');
  }

  // 主人专用：把本机日志重新发布到云端（清掉「已清空」标记与发起方标记）
  async function republishJournalShare() {
    if (!getOwnerToken()) { renderComposer(); return; }
    const fresh = await getShare();                 // 先以云端最新包（含 app 分片）为基底，避免覆盖刚由首页推上去的 app 数据
    if (fresh) sharedCache = fresh;
    pushJournalShare();   // 内部会 delete clearedAt + removeItem('ght_cleared_self')
    alert('✅ 已将本机日志重新发布到云端');
  }

  // ── 删除日志（需再次输入主人密码确认，防误删）──
  let _delTargetId = null;
  function confirmDelete(id) {
    if (!getOwnerToken()) { renderComposer(); return; }   // 访客无删除按钮，双保险
    _delTargetId = id;
    const m = document.getElementById('delModal');
    document.getElementById('delTitle').textContent = t('jo.del.title');
    document.getElementById('delDesc').textContent = t('jo.del.desc');
    document.getElementById('delPwd').value = '';
    document.getElementById('delPwd').placeholder = t('jo.del.pwd');
    document.getElementById('delConfirm').textContent = t('jo.del.confirm');
    document.getElementById('delCancel').textContent = t('jo.del.cancel');
    const err = document.getElementById('delErr'); err.hidden = true;
    m.hidden = false;
    setTimeout(() => { const p = document.getElementById('delPwd'); if (p) p.focus(); }, 40);
  }
  function closeDelModal() {
    document.getElementById('delModal').hidden = true;
    _delTargetId = null;
  }
  async function doDelete() {
    const err = document.getElementById('delErr');
    if (!_delTargetId) { if (err) { err.hidden = false; err.textContent = '该日志缺少标识，无法删除，请刷新页面后重试'; } return; }
    const pwd = document.getElementById('delPwd').value;
    if (!pwd) return;
    if (err) err.hidden = true;
    const r = await journalLogin(pwd);   // 复用主密码校验（后端 / 本地兜底）
    if (!r.ok) { err.hidden = false; err.textContent = r.msg || t('jo.del.err'); return; }
    setOwnerToken(r.token);              // 记住 token，供共享写入鉴权
    localDeletedIds.add(_delTargetId);   // 墓碑：标记该 id 已删除，跨设备不再复活
    logEntries = logEntries.filter(e => e.id !== _delTargetId);
    saveLogEntries();
    pushJournalShare();   // 日志删除同步到共享包
    closeDelModal();
    renderStats();
    renderFeed(document.querySelector('.filters .chip.active')?.dataset.filter || 'all');
  }

  // ── 启动 ──
  async function init() {
    load();
    await loadSharedJournal();   // 所有人启动即从服务端拉取并合并共享日志（访客观看、主人编辑）
    renderStats();
    renderFeed('all');
    renderComposer();
  }
  init();

  document.querySelectorAll('.filters .chip').forEach(c => {
    c.addEventListener('click', () => {
      document.querySelectorAll('.filters .chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      renderFeed(c.dataset.filter);
    });
  });

  // 跨标签页同步：在首页（或本页另一标签）解锁后，本页即时显示发布框
  window.addEventListener('storage', function (e) {
    if (e.key === TOKEN_KEY) renderComposer();
  });

  // 语言切换：重渲染信息流与发布框（均为动态 chrome；日志正文保持原文不翻译）
  window.onLangChange = function () {
    const cur = document.querySelector('.filters .chip.active')?.dataset.filter || 'all';
    renderFeed(cur);
    renderComposer();
  };

  // 删除确认弹窗：取消 / 点遮罩 / ESC 关闭
  const delMask = document.getElementById('delModal');
  const delCancel = document.getElementById('delCancel');
  if (delCancel) delCancel.addEventListener('click', closeDelModal);
  if (delMask) delMask.addEventListener('click', e => { if (e.target === delMask) closeDelModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && delMask && !delMask.hidden) closeDelModal(); });
</script>
</body>
</html>
