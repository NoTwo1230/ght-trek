<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GHT · 实际轨迹探针</title>
<style>
  :root{ --bg:#0d1117; --card:#161b22; --bd:#30363d; --tx:#e6edf3; --dim:#8b949e; --grn:#3fb950; --red:#f85149; --ylw:#d29922; --ac:#58a6ff; }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--tx);padding:24px;line-height:1.6}
  h1{font-size:18px;margin:0 0 4px}
  .sub{color:var(--dim);font-size:12px;margin-bottom:18px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px 16px}
  .card h2{font-size:13px;margin:0 0 10px;color:var(--ac)}
  .big{font-size:30px;font-weight:700;margin:2px 0}
  .ok{color:var(--grn)} .bad{color:var(--red)} .warn{color:var(--ylw)}
  pre{background:#0b0f14;border:1px solid var(--bd);border-radius:8px;padding:10px;font-size:11px;color:var(--dim);max-height:260px;overflow:auto;white-space:pre-wrap;word-break:break-all;margin:8px 0 0}
  .verdict{margin-top:16px;background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;font-size:13px}
  .verdict b{color:var(--ac)}
  button{margin-top:14px;background:var(--ac);color:#0d1117;border:0;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:600;cursor:pointer}
  .hint{color:var(--dim);font-size:11px;margin-top:10px}
</style>
</head>
<body>
  <h1>🔍 GHT 实际轨迹探针</h1>
  <div class="sub">只读检查 · 对比「本机 ght_actual」与「云端 /api/share 的 actual」——定位行程页为何缺实际徒步记录</div>

  <div class="grid">
    <div class="card">
      <h2>💻 本机 localStorage</h2>
      <div class="big" id="localCount">…</div>
      <div id="localNote" class="hint"></div>
      <pre id="localSample">读取中…</pre>
    </div>
    <div class="card">
      <h2>☁️ 云端共享包 (/api/share)</h2>
      <div class="big" id="cloudCount">…</div>
      <div id="cloudNote" class="hint"></div>
      <pre id="cloudSample">读取中…</pre>
    </div>
  </div>

  <div class="verdict" id="verdict">判定中…</div>

  <button onclick="location.reload()">↻ 重新检测</button>
  <div class="hint">本页为一次性诊断工具，确认根因后由开发者删除，不会留在正式站点。</div>

<script>
function sum(a){ try{ return JSON.stringify(a).length+' 字节'; }catch(e){ return '?'; } }
function sample(arr, n){
  if(!arr||!arr.length) return '(空)';
  return arr.slice(0,n).map(t=>{
    const fn=t.fileName||('day'+(t.dayNum!=null?t.dayNum:'?'));
    return '• '+fn+'  day'+(t.dayNum!=null?t.dayNum:'?')+'  '+(t.distance||'?')+'km  '+(t.elevGain||'?')+'m↑  date='+(t.date||'—');
  }).join('\n') + (arr.length>n?'\n… 共 '+arr.length+' 条':'');
}
(async function(){
  // 本机
  let local=null;
  try{ const s=localStorage.getItem('ght_actual'); local = s?JSON.parse(s):null; }catch(e){}
  if(!Array.isArray(local)) local=[];
  document.getElementById('localCount').textContent = local.length+' 条';
  document.getElementById('localCount').className = 'big '+(local.length?'ok':'bad');
  document.getElementById('localNote').textContent = local.length? '本机已缓存实际轨迹 ✓' : '本机 ght_actual 为空';
  document.getElementById('localSample').textContent = sample(local,6);

  // 云端
  let cloud=null, err=null;
  try{
    const r = await fetch('/api/share');
    if(r.ok){ const j=await r.json(); cloud = (j&&j.data&&j.data.actual)||null; }
    else err='HTTP '+r.status;
  }catch(e){ err=e.message||String(e); }
  const cloudArr = Array.isArray(cloud)?cloud:null;
  document.getElementById('cloudCount').textContent = cloudArr? (cloudArr.length+' 条') : '读取失败';
  document.getElementById('cloudCount').className = 'big '+(cloudArr&&cloudArr.length?'ok':(err?'warn':'bad'));
  document.getElementById('cloudNote').textContent = err? ('⚠️ '+err) : (cloudArr&&cloudArr.length? '云端有实际轨迹 ✓' : '云端 actual 为空');
  document.getElementById('cloudSample').textContent = cloudArr? sample(cloudArr,6) : (err||'(空)');

  // 判定
  const lv=local.length, cv=cloudArr?cloudArr.length:0;
  let v='';
  if(lv && cv){ v='<b>两边都一致有数据（'+lv+' 条）</b><br>那行程页按理该显示实际记录。若仍不显示，请把 itinerary.html 的 CALENDAR 诊断贴给我——可能是 dayNum 匹配或渲染问题，不是数据缺失。'; }
  else if(lv && !cv){ v='<b>本机有 '+lv+' 条，但云端为空。</b><br>这就是根因：行程页在「没有本机数据的机器」上打开时，云端也拉不到 → 显示空。<br><br><b>修复：在你这台（本机有数据的）机器上打开主 app，点「🔄 重新发布共享」，把实际轨迹推上云端。之后任意设备打开行程页都能自愈。</b>'; }
  else if(!lv && cv){ v='<b>云端有 '+cv+' 条，但本机为空。</b><br>本应被 itinerary.html 的 healFromCloud 自动拉回本地。若没拉到，可能是 healFromCloud 报错或被拦截。<br><br><b>修复：硬刷新（Safari: ⌘+⌥+R）行程页即可触发自愈。</b>'; }
  else { v='<b>两边都为空。</b><br>说明实际轨迹从未成功进入云端、本机也没缓存——可能上传发生在另一台机器且被「重新发布共享」覆盖清空了。<br><br><b>修复：到有原始 GPX 的机器重新上传实际轨迹（或在该机器重新发布共享），再硬刷新行程页。</b>'; }
  document.getElementById('verdict').innerHTML = v;
})();
</script>
</body>
</html>
