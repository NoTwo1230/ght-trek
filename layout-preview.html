<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHT · 计划 vs 实际 · 布局预览</title>
<style>
  :root{
    --bg:#0d1117; --bg-2:#161b22; --border:#30363d; --text:#e6edf3; --text-dim:#8b949e;
    --accent:#58a6ff; --green:#3fb950; --red:#f85149; --orange:#FFA94D;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;font-size:13px;line-height:1.5;}
  .wrap{max-width:880px;margin:0 auto;padding:18px 16px 60px;}
  h1{font-size:17px;margin:0 0 4px;}
  .sub{color:var(--text-dim);font-size:12px;margin-bottom:14px;}
  /* 切换器 */
  .seg{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
  .seg button{background:var(--bg-2);border:1px solid var(--border);color:var(--text-dim);
    padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;transition:.15s;}
  .seg button:hover{color:var(--text);}
  .seg button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .layout-note{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;
    padding:10px 14px;font-size:12px;color:var(--text-dim);margin-bottom:16px;line-height:1.7;}
  .layout-note b{color:var(--text);}
  /* —— 通用卡片元素 —— */
  .day-num{font-weight:700;font-size:14px;}
  .chip{font-size:10px;padding:1px 6px;border-radius:4px;margin-left:5px;vertical-align:middle;}
  .chip.rest{background:rgba(63,185,80,.2);color:var(--green);}
  .chip.delay{background:rgba(255,169,77,.2);color:var(--orange);}
  .chip.today{background:var(--accent);color:#fff;}
  .chip.ahead{background:rgba(63,185,80,.18);color:var(--green);}
  .chip.behind{background:rgba(248,81,73,.18);color:var(--red);}
  .chip.ontime{background:rgba(88,166,255,.18);color:var(--accent);}
  .delta-red{color:var(--red);font-size:11px;}
  .delta-green{color:var(--green);font-size:11px;}
  .plan{color:var(--text-dim);min-width:52px;display:inline-block;}
  .route{font-size:12px;color:var(--text-dim);}
  .arrow{color:var(--text-dim);margin:0 5px;}
  /* A: 左右两栏 */
  .card{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
  .card .head{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border);}
  .card .cols{display:grid;grid-template-columns:1fr 1px 1fr;}
  .card .col{padding:10px 12px;}
  .card .divider{background:var(--border);}
  .card .col-title{font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:6px;}
  .col-title.plan-t{color:var(--accent);}
  .col-title.act-t{color:var(--green);}
  .stat-row{display:flex;justify-content:space-between;padding:2px 0;font-size:12px;}
  .col .actual{color:var(--green);font-weight:600;}
  .slip-banner{background:rgba(255,169,77,.14);border:1px solid rgba(255,169,77,.4);color:var(--orange);
    padding:7px 12px;border-radius:8px;font-size:12px;margin-bottom:12px;line-height:1.6;}
  .warn{background:rgba(248,81,73,.14);border:1px solid rgba(248,81,73,.4);color:var(--red);
    padding:6px 10px;border-radius:6px;font-size:11px;margin-top:6px;}
  /* B: 平行时间轴 */
  .tl{display:grid;grid-template-columns:1fr 64px 1fr;gap:0;align-items:stretch;}
  .tl-col-h{font-size:11px;font-weight:700;padding:6px 10px;text-align:center;border-bottom:1px solid var(--border);}
  .tl-col-h.plan-h{color:var(--accent);} .tl-col-h.act-h{color:var(--green);}
  .tl-mid{position:relative;}
  .tl-row{display:grid;grid-template-columns:1fr 64px 1fr;}
  .tl-cell{background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin:5px;}
  .tl-cell.empty{background:transparent;border:1px dashed var(--border);color:var(--text-dim);
    display:flex;align-items:center;justify-content:center;font-size:11px;}
  .tl-conn{position:relative;height:100%;}
  .tl-conn svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;}
  .slip-note{text-align:center;color:var(--orange);font-size:10px;margin:4px 0;}
  /* C: 独立列表 */
  .tabs{display:flex;gap:8px;margin-bottom:12px;}
  .tabs button{background:var(--bg-2);border:1px solid var(--border);color:var(--text-dim);
    padding:7px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;}
  .tabs button.on{background:var(--green);color:#fff;border-color:var(--green);}
  .tabs button.on.p{background:var(--accent);border-color:var(--accent);}
  .list-card{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
  .list-card .row1{display:flex;justify-content:space-between;align-items:center;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <h1>GHT 追踪 · 计划 vs 实际 · 布局预览</h1>
  <div class="sub">用你贴的真实数据（Day3 休息/天气延误 → 整体晚 1 天；且 Day3、Day4 实际 GPS 都落在 11-04）。点上方切换看三种形态。</div>

  <div class="seg">
    <button id="bA" class="on" onclick="setLayout('A')">A · 每张卡左右两栏</button>
    <button id="bB" onclick="setLayout('B')">B · 上下平行时间轴</button>
    <button id="bC" onclick="setLayout('C')">C · 两个独立列表</button>
  </div>

  <div id="note"></div>
  <div id="stage"></div>
</div>

<script>
/* ===== 数据（来自你贴的真实记录）===== */
// 计划：固定，永远按导入的预设轨迹
const PLAN = [
  {day:1, from:'Phungling', to:'Kunjari', pass:'Deurali Bhanjyang', planDate:'11-01', dist:20.8, gain:2285},
  {day:2, from:'Kunjari', to:'Yamphudin', pass:'Sinchewa Bhanjyang', planDate:'11-02', dist:20.2, gain:1989},
  {day:3, from:'Yamphudin', to:'Tortongdin', planDate:'11-03', dist:13.0, gain:2586, rest:false},
  {day:4, from:'Tortongdin', to:'Tseram', planDate:'11-04', dist:8.7, gain:1081},
  {day:5, from:'Tseram', to:'Ramche', planDate:'11-05', dist:14.0, gain:981},
  {day:6, from:'Ramche', to:'Ghunsa', pass:'Sinelapche/Mirgin/Sele La', planDate:'11-06', dist:21.9, gain:1352},
];
// 实际：按 GPS 真实日期如实排列（文件名→对应计划路段）
const ACTUAL = [
  {file:'day01', routeDay:1, gpsDate:'11-01', dist:20.8, gain:2285},
  {file:'day02', routeDay:2, gpsDate:'11-02', dist:20.2, gain:1989},
  {file:'day03', routeDay:3, gpsDate:'11-04', actFrom:'Yamphudin', actTo:'中途(4.5km处)', dist:4.5, gain:487, partial:true},   // 只走了一部分
  {file:'day04', routeDay:4, gpsDate:'11-04', actFrom:'Tortongdin', actTo:'中途(4.2km处)', dist:4.2, gain:593, partial:true},   // 与 day03 同一天！
  {file:'day05', routeDay:5, gpsDate:'11-06', dist:14.0, gain:981},
  {file:'day06', routeDay:6, gpsDate:'11-07', dist:21.9, gain:1352},
];
const planByDay = Object.fromEntries(PLAN.map(d=>[d.day,d]));
const actByRouteDay = Object.fromEntries(ACTUAL.map(a=>[a.routeDay,a]));

/* ===== 顶部说明 ===== */
const NOTES = {
  A:'<b>布局 A · 每张卡左右两栏（各自独立起点/终点）</b>：左栏「计划」固定不动，右栏「实际」按 GPS 真实记录。两栏各自显示当天的 📍起点 / 📍终点 —— Day3 计划终点是 Tortongdin，实际终点却是「中途(4.5km处)」，标红提示"只走了一部分"。休息日右栏直接显示「🏕️ 休息·未行进」。Day3 起日期整体晚 1 天、Day3/Day4 同日矛盾也都清晰暴露。',
  B:'<b>布局 B · 上下平行时间轴</b>：左轴按<b>计划日期</b>排，右轴按<b>GPS 真实日期</b>排，中间连线表示「计划第N天 ↔ 实际第N天」。Day1/Day2 连线水平对齐，Day3 起连线斜向下 —— 整体晚 1 天变成一条可见的对角线。右轴 11-03 是空档（休息日），11-04 挤了两条（day03+day04）。',
  C:'<b>布局 C · 两个独立列表</b>：彻底解耦。一个「📋 计划行程」永不改动；一个「📡 实际记录」按 GPS 日期排列。自己对照两者就能判断滑移，绝不互相污染。'
};
function setLayout(l){
  ['A','B','C'].forEach(x=>document.getElementById('b'+x).classList.toggle('on',x===l));
  document.getElementById('note').innerHTML = NOTES[l];
  document.getElementById('stage').innerHTML = ({A:renderA,B:renderB,C:renderC})[l]();
}

/* ===== A：左右两栏 ===== */
function renderA(){
  const banner = `<div class="slip-banner">⚠️ 整体晚 <b>1 天</b>：Day3 因天气/休息未走，导致 Day4 起实际比计划整体滞后 1 天（对照右栏日期）。</div>`;
  let cards = PLAN.map(d=>{
    const a = actByRouteDay[d.day];
    const dd = a ? dayDiff(a.gpsDate, d.planDate) : null;
    let status = '';
    if(a){ status = dd>0?`<span class="chip behind">🔴 晚${dd}天</span>`:dd<0?`<span class="chip ahead">🟢 快${-dd}天</span>`:`<span class="chip ontime">🔵 准时</span>`; }
    const sameDayWarn = (d.day===3||d.day===4) ? `<div class="warn">⚠️ 实际 GPS 日期 11-04 与 Day${d.day===3?4:3} 撞车同日</div>` : '';
    const planCol = `
      <div class="col">
        <div class="col-title plan-t">📋 计划</div>
        <div class="stat-row"><span class="plan">📅 日期</span><span>${d.planDate}</span></div>
        <div class="stat-row"><span class="plan">📍 起点</span><span>${d.from}</span></div>
        <div class="stat-row"><span class="plan">📍 终点</span><span>${d.to}</span></div>
        <div class="stat-row"><span class="plan">📏 距离</span><span>${d.dist}km</span></div>
        <div class="stat-row"><span class="plan">⬆️ 爬升</span><span>${d.gain}m</span></div>
        ${d.pass?`<div class="route" style="margin-top:5px;font-size:10px;color:var(--orange);">⛰ ${d.pass}</div>`:''}
      </div>`;
    // 实际栏：独立记录当天 GPS 的起点/终点（可能与计划不同）
    let actCol;
    if(!a){
      actCol = `<div class="col"><div class="col-title act-t">📡 实际</div>
        <div class="route" style="color:var(--text-dim);margin-top:6px;">⏳ 等待 GPS</div></div>`;
    } else if(a.rest){
      actCol = `<div class="col"><div class="col-title act-t">📡 实际</div>
        <div style="margin-top:6px;color:var(--green);font-size:12px;">🏕️ 休息 · 未行进</div></div>`;
    } else {
      const endMismatch = a.actTo && d.to && a.actTo !== d.to;
      actCol = `
      <div class="col">
        <div class="col-title act-t">📡 实际</div>
        <div class="stat-row"><span class="plan">📅 日期</span><span class="actual">${a.gpsDate}</span></div>
        <div class="stat-row"><span class="plan">📍 起点</span><span class="actual">${a.actFrom||'—'}</span></div>
        <div class="stat-row"><span class="plan">📍 终点</span><span class="actual" ${endMismatch?`style="color:var(--red);"`:''}>${a.actTo||'—'}</span></div>
        <div class="stat-row"><span class="plan">📏 距离</span><span class="actual">${a.dist}km</span></div>
        <div class="stat-row"><span class="plan">⬆️ 爬升</span><span class="actual">${a.gain}m</span></div>
        <div class="stat-row"><span class="plan">📁 文件</span><span>${a.file}</span></div>
        ${endMismatch?`<div class="warn">⚠️ 实际终点≠计划终点（只走了一部分 / 路线有偏差）</div>`:''}
        ${sameDayWarn}
      </div>`;
    }
    return `<div class="card">
      <div class="head">
        <div><span class="day-num">Day ${d.day}</span>${d.rest?'<span class="chip rest">🏕️ 休息</span>':''}${status}</div>
        <div class="route">${d.from}<span class="arrow">→</span>${d.to}</div>
      </div>
      <div class="cols">${planCol}<div class="divider"></div>${actCol}</div>
    </div>`;
  }).join('');
  return banner + cards;
}

/* ===== B：平行时间轴 ===== */
function renderB(){
  // 左轴：按 planDate 顺序；右轴：按 gpsDate 顺序（含空档）
  const planRows = PLAN.map(d=>{
    const a = actByRouteDay[d.day];
    return `<div class="tl-cell">
      <div><span class="day-num">Day ${d.day}</span> <span class="chip ontime" style="font-size:9px;">计划 ${d.planDate}</span></div>
      <div class="route">${d.from}<span class="arrow">→</span>${d.to}</div>
      <div class="stat-row" style="margin-top:4px;"><span class="plan">📏</span><span>${d.dist}km</span></div>
    </div>`;
  });
  // 右轴按 gpsDate 排，先收集 unique 日期
  const dates = [...new Set(ACTUAL.map(a=>a.gpsDate))].sort();
  const actRows = dates.map(gd=>{
    const items = ACTUAL.filter(a=>a.gpsDate===gd);
    if(!items.length) return `<div class="tl-cell empty">— 无记录 —</div>`;
    return `<div class="tl-cell">${items.map(a=>{
      const d = planByDay[a.routeDay];
      return `<div style="margin-bottom:4px;">
        <span class="day-num" style="font-size:12px;">Day ${a.routeDay}</span>
        <span class="chip ahead" style="font-size:9px;">实际 ${a.gpsDate}</span>
        <div class="route" style="font-size:11px;">${d.from}<span class="arrow">→</span>${d.to}</div>
        <div class="stat-row" style="font-size:11px;"><span class="plan">📏</span><span class="actual">${a.dist}km</span></div>
      </div>`;
    }).join('<hr style="border:none;border-top:1px dashed var(--border);margin:5px 0;">')}</div>`;
  });
  // 中间连线（简化：用斜线示意，整体晚1天）
  const mid = PLAN.map((d,i)=>{
    const slip = i<2 ? '水平' : '斜下';
    return `<div class="tl-conn"><svg viewBox="0 0 64 40" preserveAspectRatio="none">
      <line x1="32" y1="6" x2="${i<2?32:10}" y2="34" stroke="${i<2?'var(--green)':'var(--orange)'}" stroke-width="2" stroke-dasharray="3 3"/></svg></div>`;
  }).join('');
  let cells = '';
  for(let i=0;i<Math.max(planRows.length,dates.length);i++){
    cells += `<div class="tl-row">
      <div>${planRows[i]||''}</div>
      <div class="tl-conn"><svg viewBox="0 0 64 40" preserveAspectRatio="none">
        ${i<planRows.length?`<line x1="32" y1="6" x2="${i<2?32:8}" y2="34" stroke="${i<2?'var(--green)':'var(--orange)'}" stroke-width="2" stroke-dasharray="3 3"/>`:''}
      </svg></div>
      <div>${actRows[i]||''}</div>
    </div>`;
  }
  return `<div class="tl">
    <div class="tl-col-h plan-h">📋 计划（按计划日期）</div>
    <div></div>
    <div class="tl-col-h act-h">📡 实际（按 GPS 日期）</div>
  </div>
  <div style="margin-top:8px;">${cells}</div>
  <div class="slip-note">↑ Day1/2 连线水平（准时）；Day3 起斜向下 = 整体晚 1 天 ↓</div>`;
}

/* ===== C：独立列表 ===== */
function renderC(){
  return `<div class="tabs">
      <button id="tabP" class="p on" onclick="setCTab('P')">📋 计划行程（固定）</button>
      <button id="tabA" onclick="setCTab('A')">📡 实际记录（按 GPS 日期）</button>
    </div>
    <div id="cP">
      ${PLAN.map(d=>`<div class="list-card">
        <div class="row1"><span><span class="day-num">Day ${d.day}</span> <span class="chip ontime" style="font-size:9px;">计划 ${d.planDate}</span></span>
        <span class="route">${d.from}<span class="arrow">→</span>${d.to}</span></div>
        <div class="stat-row" style="margin-top:5px;"><span class="plan">📏 距离</span><span>${d.dist}km</span></div>
        <div class="stat-row"><span class="plan">⬆️ 爬升</span><span>${d.gain}m</span></div>
        ${d.pass?`<div class="route" style="margin-top:3px;font-size:10px;color:var(--orange);">⛰ ${d.pass}</div>`:''}
      </div>`).join('')}
      <div class="layout-note" style="margin-top:8px;">计划行程由导入的预设轨迹自动生成，<b>永不随实际记录改动</b>，是稳定的对照基准。</div>
    </div>
    <div id="cA" class="hidden">
      ${ACTUAL.map(a=>{const d=planByDay[a.routeDay];return `<div class="list-card">
        <div class="row1"><span><span class="day-num">Day ${a.routeDay}</span> <span class="chip ahead" style="font-size:9px;">实际 ${a.gpsDate}</span></span>
        <span class="route">${d.from}<span class="arrow">→</span>${d.to}</span></div>
        <div class="stat-row" style="margin-top:5px;"><span class="plan">📏 距离</span><span class="actual">${a.dist}km</span></div>
        <div class="stat-row"><span class="plan">⬆️ 爬升</span><span class="actual">${a.gain}m</span></div>
        <div class="stat-row"><span class="plan">📁 文件</span><span>${a.file}</span></div>
      </div>`;}).join('')}
      <div class="warn" style="margin-top:8px;">⚠️ day03 与 day04 的实际 GPS 日期都是 <b>11-04</b>（同日矛盾），真实数据需核对。</div>
    </div>`;
}
function setCTab(t){
  document.getElementById('tabP').classList.toggle('on',t==='P');
  document.getElementById('tabA').classList.toggle('on',t==='A');
  document.getElementById('cP').classList.toggle('hidden',t!=='P');
  document.getElementById('cA').classList.toggle('hidden',t!=='A');
}

/* 日期差（dd.mm 形式简易比较，忽略年）*/
function dayDiff(a,b){
  const pa=a.split('-').map(Number), pb=b.split('-').map(Number);
  return (pa[1]-pb[1]) + (pa[0]-pb[0])*30; // 月差*30+日差（够用）
}

setLayout('A');
</script>
</body>
</html>
