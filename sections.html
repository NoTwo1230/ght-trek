<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHT 路段全景 · 13 段区域徒步指南</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap">
<!-- 预加载首屏 coverflow 图片，消除白屏等待 -->
<link rel="preload" as="image" href="assets/region-maps/kanchenjunga_index.png">
<link rel="preload" as="image" href="assets/region-maps/makalu_index.png">
<link rel="preload" as="image" href="assets/region-maps/everest_index.png">
<style>
  :root{
    --bg:#0a0e14; --panel:#0d1219; --panel-alt:#11161f; --border:#1c2333;
    --border-light:#21262d; --text:#e6edf3; --text-dim:#8b949e; --text-dimmer:#6e7681;
    --accent:#58a6ff; --accent-bg:#1a3a5c; --green:#3fb950; --amber:#d29922;
    --red:#f85149; --purple:#bc8cff; --cyan:#39d2c0;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  html,body{height:100%}
  body{
    font-family:'Noto Sans SC',-apple-system,sans-serif;
    background:radial-gradient(1200px 600px at 85% -10%,rgba(88,166,255,.07),transparent 60%),
               radial-gradient(900px 500px at -10% 110%,rgba(240,136,62,.05),transparent 60%),var(--bg);
    color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5;overflow-x:hidden;
  }
  /* ── topbar ── */
  .topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:14px;
    padding:13px 20px;background:rgba(10,14,20,.82);backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-wrap:wrap}
  .topbar .title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:9px;white-space:nowrap}
  .topbar .title .glyph{width:30px;height:30px;border-radius:8px;background:var(--accent-bg);
    border:1px solid rgba(88,166,255,.25);display:flex;align-items:center;justify-content:center;font-size:16px}
  .topbar .title small{font-weight:400;color:var(--text-dim);font-size:11px}
  .back-link{margin-left:auto;display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:var(--text-dim);
    border:1px solid var(--border-light);border-radius:8px;padding:7px 13px;font-size:12px;transition:.2s}
  .back-link:hover{color:var(--text);border-color:var(--accent);background:rgba(88,166,255,.08)}
  .lang-btn{margin-left:14px;display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-family:inherit;
    background:rgba(255,255,255,.04);color:var(--text);border:1px solid var(--border-light);
    border-radius:8px;padding:7px 13px;font-size:12px;transition:.2s}
  .lang-btn:hover{color:#fff;border-color:var(--accent);background:rgba(88,166,255,.08)}

  /* ── intro banner ── */
  .banner{max-width:1320px;margin:0 auto;padding:20px 20px 4px}
  .banner h1{font-size:22px;font-weight:900;letter-spacing:.5px}
  .banner h1 span{color:var(--accent)}
  .banner p{color:var(--text-dim);font-size:13px;margin-top:6px;max-width:880px}
  .note{display:inline-flex;gap:8px;align-items:center;margin-top:12px;font-size:12px;color:var(--text-dim);
    background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:8px;padding:8px 12px}
  .note b{color:var(--amber)}

  /* ── toolbar ── */
  .toolbar{max-width:1320px;margin:16px auto 0;padding:0 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--border);border-radius:9px;overflow:hidden}
  .seg button{border:none;background:transparent;color:var(--text-dim);padding:6px 13px;font-size:12.5px;cursor:pointer;font-family:inherit;transition:.15s}
  .seg button:hover{color:var(--text)}
  .seg button.active{background:var(--accent-bg);color:var(--accent)}
  .legend-key{display:flex;gap:14px;font-size:11.5px;color:var(--text-dim);margin-left:auto;flex-wrap:wrap}
  .legend-key i{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}

  /* ── coverflow ── */
  .cover-head{max-width:1320px;margin:20px auto 0;padding:0 20px;display:flex;align-items:baseline;gap:10px}
  .cover-head h2{font-size:14px;font-weight:700;letter-spacing:.5px}
  .cover-head span{font-size:11.5px;color:var(--text-dim)}
  .cover-wrap{position:relative;max-width:1320px;margin:8px auto 6px;overflow:hidden;padding:0 10px}
  .stage{position:relative;height:360px;perspective:1500px;display:flex;align-items:center;justify-content:center}
  .track{position:relative;width:100%;height:100%}
  .cfc{position:absolute;left:50%;top:50%;width:300px;height:230px;border-radius:16px;overflow:hidden;
    transform-style:preserve-3d;cursor:pointer;will-change:transform,opacity;
    transition:transform .55s cubic-bezier(.22,.61,.36,1),opacity .4s ease,box-shadow .4s ease;
    box-shadow:0 10px 30px rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.06);background:#05080d}
  .cfc.is-active{box-shadow:0 26px 60px rgba(0,0,0,.6),0 0 0 2px var(--rb),0 0 36px -6px var(--rc)}
  .cfc-img{position:relative;width:100%;height:100%}
  .cfc-img img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;
    transition:transform .5s ease,filter .4s ease;filter:saturate(.92) brightness(.92)}
  .cfc.is-active .cfc-img img{filter:saturate(1.05) brightness(1)}
  .cfc:hover .cfc-img img{transform:scale(1.05)}
  .cfc-num{position:absolute;top:9px;left:9px;font-size:19px;font-weight:900;color:#fff;
    background:var(--rc);border:1px solid var(--rb);padding:2px 10px;border-radius:8px;letter-spacing:1px;z-index:3;
    text-shadow:0 1px 3px rgba(0,0,0,.6)}
  .cfc-status{position:absolute;top:9px;right:9px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;z-index:3}
  .cfc-status.meas{background:rgba(63,185,80,.2);color:var(--green);border:1px solid rgba(63,185,80,.55)}
  .cfc-status.plan{background:rgba(210,153,34,.18);color:var(--amber);border:1px solid rgba(210,153,34,.55)}
  .cfc-view{position:absolute;left:11px;right:11px;bottom:9px;z-index:4;cursor:pointer;
    border:1px solid var(--rb);background:rgba(10,14,20,.55);color:#fff;backdrop-filter:blur(4px);
    border-radius:9px;padding:7px;font-size:11.5px;font-weight:600;font-family:inherit;
    opacity:0;transform:translateY(8px);transition:opacity .3s ease,transform .3s ease,background .2s}
  .cfc:hover .cfc-view,.cfc.is-active .cfc-view{opacity:1;transform:translateY(0)}
  .cfc-view:hover{background:var(--rc);border-color:var(--rc)}
  .cfc-view:hover{box-shadow:0 0 18px -2px var(--rc)}
  /* arrows + dots */
  .cf-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:20;width:42px;height:42px;border-radius:50%;
    border:1px solid var(--border-light);background:rgba(13,18,25,.7);color:var(--text-dim);font-size:22px;line-height:1;
    cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s;backdrop-filter:blur(6px)}
  .cf-arrow:hover{color:var(--text);border-color:var(--accent);background:rgba(88,166,255,.12)}
  .cf-prev{left:4px}.cf-next{right:4px}
  .cf-dots{max-width:1320px;margin:4px auto 56px;padding:0 20px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .cf-dot{width:9px;height:9px;border-radius:50%;border:1px solid var(--border-light);background:transparent;
    cursor:pointer;padding:0;transition:.2s}
  .cf-dot:hover{background:var(--rc);border-color:var(--rc)}
  .cf-dot.active{background:var(--rc);border-color:var(--rb);box-shadow:0 0 10px -1px var(--rc);transform:scale(1.25)}

  /* ── detail panel ── */
  .detail{position:fixed;inset:0;z-index:300;display:none}
  .detail.open{display:block}
  .d-backdrop{position:absolute;inset:0;background:rgba(4,7,12,.93);backdrop-filter:blur(10px)}
  .detail-card{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:min(1120px,94vw);max-height:92vh;background:var(--panel);border:1px solid var(--border-light);
    border-radius:18px;overflow:hidden;display:grid;grid-template-columns:1.04fr 1fr;
    box-shadow:0 40px 100px rgba(0,0,0,.7);border-top:3px solid var(--rc)}
  .d-media{position:relative;background:#05080d;min-height:440px}
  .d-media img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;cursor:zoom-in}
  .d-info{padding:24px 26px 26px;overflow:auto;display:flex;flex-direction:column;gap:15px}
  .d-close{position:absolute;top:12px;right:14px;z-index:5;width:34px;height:34px;border-radius:50%;
    border:1px solid var(--border-light);background:rgba(13,18,25,.6);color:var(--text);font-size:20px;line-height:1;
    cursor:pointer;transition:.2s}
  .d-close:hover{background:var(--red);border-color:var(--red);color:#fff}
  .d-head{display:flex;align-items:center;gap:12px;padding-right:40px}
  .d-num{font-size:22px;font-weight:900;color:#fff;background:var(--rc);border:1px solid var(--rb);
    padding:3px 11px;border-radius:9px;letter-spacing:1px;text-shadow:0 1px 2px rgba(0,0,0,.5)}
  .d-head .d-zh{font-size:21px;font-weight:800;display:block;line-height:1.1}
  .d-head .d-en{font-size:10px;letter-spacing:1.5px;color:var(--text-dim);font-weight:500}
  .d-status{margin-left:auto;font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;white-space:nowrap}
  .d-status.meas{background:rgba(63,185,80,.18);color:var(--green);border:1px solid rgba(63,185,80,.5)}
  .d-status.plan{background:rgba(210,153,34,.16);color:var(--amber);border:1px solid rgba(210,153,34,.5)}
  .d-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .d-stat{background:var(--panel-alt);border:1px solid var(--border-light);border-radius:10px;padding:9px 12px}
  .d-stat .d-v{font-size:17px;font-weight:800;line-height:1.1}
  .d-stat .d-v small{font-size:10px;font-weight:500;color:var(--text-dim);margin-left:2px}
  .d-stat .d-v.ref{color:var(--amber)}
  .d-stat .d-l{font-size:10px;color:var(--text-dim);margin-top:2px}
  .d-section{border-top:1px dashed var(--border-light);padding-top:12px;display:flex;flex-direction:column;gap:7px}
  .d-st{font-size:11px;color:var(--text);font-weight:700;letter-spacing:.5px}
  .d-section p{font-size:12.5px;color:var(--text-dim);line-height:1.6}
  .d-passes{display:flex;flex-wrap:wrap;gap:6px}
  .pchip{font-size:11px;background:rgba(57,210,192,.08);border:1px solid rgba(57,210,192,.3);color:#9fe9df;
    padding:3px 9px;border-radius:7px}
  .pchip b{color:var(--cyan);font-weight:700;margin-left:3px}
  .d-hint{font-size:10.5px;color:var(--text-dimmer);text-align:center;margin-top:2px}

  /* ── image lightbox ── */
  .lb{position:fixed;inset:0;z-index:400;background:rgba(3,6,10,.9);backdrop-filter:blur(6px);
    display:none;align-items:center;justify-content:center;padding:24px;flex-direction:column;gap:14px}
  .lb.open{display:flex}
  .lb-cap{color:var(--text);font-size:14px;font-weight:600}
  .lb-imgs{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:1000px}
  .lb-imgs img{max-width:min(92vw,820px);max-height:80vh;border-radius:10px;border:1px solid var(--border-light);background:#05080d}
  .lb-close{position:absolute;top:18px;right:22px;cursor:pointer;color:var(--text-dim);font-size:26px;line-height:1;
    background:none;border:none;transition:.2s;z-index:5}
  .lb-close:hover{color:var(--text)}

  @media(max-width:760px){
    .detail-card{grid-template-columns:1fr;max-height:94vh}
    .d-media{min-height:240px;max-height:38vh}
    .stage{height:300px}
    .cfc{width:240px;height:188px}
    .cf-arrow{width:36px;height:36px;font-size:19px}
  }
  @media(max-width:560px){
    .banner h1{font-size:19px}
    .legend-key{margin-left:0}
  }
</style>
<script src="lang.js"></script>
</head>
<body>
  <div class="topbar">
    <div class="title"><span class="glyph">🏔️</span> <span data-i18n="sec.title">GHT 路段全景</span> <small data-i18n="sec.sub">· 13 段区域徒步指南</small></div>
    <a class="back-link" href="index.html" data-i18n="back.main">← 返回主站</a>
    <button class="lang-btn" type="button">中文 ▾</button>
  </div>

  <div class="banner">
    <h1 data-i18n="sec.banner">GHT 大喜马拉雅高线 · 13 段 区域徒步</h1>
    <p data-i18n="sec.banner2">从东端的干城章嘉到西陲的达尔楚拉，整条高线穿越 13 个尼泊尔区域。横屏滑动浏览每段区域地图与名称，悬停即可居中放大，点击「查看大图」进入含全部徒步数据的详情页。</p>
    <div class="note">📊 <span id="dataNote" data-i18n="sec.note.loading">数据说明：加载中…</span></div>
  </div>

  <div class="toolbar">
    <div class="seg" id="filter">
      <button class="active" data-f="all" data-i18n="sec.filter.all">全部 13</button>
      <button data-f="meas" id="fMeas">完成 0</button>
      <button data-f="plan" id="fPlan">计划 13</button>
    </div>
    <div class="legend-key">
      <span><i style="background:var(--green)"></i><span data-i18n="sec.legend.meas">完成 · 来自轨迹</span></span>
      <span><i style="background:var(--amber)"></i><span data-i18n="sec.legend.plan">计划 · 参考里程</span></span>
    </div>
  </div>

  <div class="cover-head">
    <h2 data-i18n="sec.cover">🗺️ 路段全景</h2>
    <span data-i18n="sec.cover2">悬停切换 · 点击「查看大图」看完整数据</span>
  </div>

  <div class="cover-wrap">
    <button class="cf-arrow cf-prev" id="cfPrev" aria-label="上一段">‹</button>
    <div class="stage" id="stage"><div class="track" id="track"></div></div>
    <button class="cf-arrow cf-next" id="cfNext" aria-label="下一段">›</button>
  </div>
  <div class="cf-dots" id="cfDots"></div>

  <!-- detail panel -->
  <div class="detail" id="detail">
    <div class="d-backdrop"></div>
    <div class="detail-card">
      <div class="d-media"><img class="d-img" src="" alt="" width="560" height="440"></div>
      <div class="d-info">
        <button class="d-close" aria-label="关闭">×</button>
        <div class="d-head">
          <span class="d-num">01</span>
          <div><span class="d-zh">—</span><span class="d-en">—</span></div>
          <span class="d-status meas">—</span>
        </div>
        <div class="d-stats">
          <div class="d-stat"><div class="d-v d-dist">—</div><div class="d-l" data-i18n="sec.detail.dist">距离</div></div>
          <div class="d-stat"><div class="d-v d-asc">—</div><div class="d-l" data-i18n="sec.detail.asc">累计爬升</div></div>
          <div class="d-stat"><div class="d-v d-desc">—</div><div class="d-l" data-i18n="sec.detail.desc">累计下降</div></div>
          <div class="d-stat"><div class="d-v d-max">—</div><div class="d-l" data-i18n="sec.detail.max">最高海拔</div></div>
          <div class="d-stat"><div class="d-v d-min">—</div><div class="d-l" data-i18n="sec.detail.min">最低海拔</div></div>
        </div>
        <div class="d-section">
          <div class="d-st" data-i18n="sec.detail.passes">🏔️ 主要垭口 / 山峰</div>
          <div class="d-passes"></div>
        </div>
        <div class="d-section">
          <div class="d-st" data-i18n="sec.detail.legend">📜 区域传说</div>
          <p class="d-legend"></p>
        </div>
        <div class="d-section">
          <div class="d-st" data-i18n="sec.detail.scenery">🌄 招牌景色</div>
          <p class="d-scenery"></p>
        </div>
        <div class="d-hint" data-i18n="sec.detail.hint">点击左侧地图可放大查看原图</div>
      </div>
    </div>
  </div>

  <!-- image-only lightbox -->
  <div class="lb" id="lb">
    <button class="lb-close" id="lbClose">×</button>
    <div class="lb-cap" id="lbCap"></div>
    <div class="lb-imgs" id="lbImgs"></div>
  </div>

  <script src="sections-data.js"></script>
  <script src="ght-regions.js"></script>
  <script>
  (function(){
    const t = window.GHTI18N.t;
    const data = window.GHT_SECTIONS || [];
    // 真实垭口/山峰：取自已导入的预设 GPX（按 Voronoi 锚点归属到各路段）。
    // 未导入预设时返回 null，passesHTML 自动回退到 sections-data.js 的静态种子数据。
    const regionPasses = (window.GHT_REGIONS && window.GHT_REGIONS.getRegionPasses)
      ? window.GHT_REGIONS.getRegionPasses() : null;
    // 完成状态由首页实际轨迹动态决定；重置后 ght_region_measured 被清空 → 全部回到「计划」
    data.forEach(r => { r.measured = false; });
    try {
      const rm = JSON.parse(localStorage.getItem('ght_region_measured') || '{}');
      data.forEach(r => { if (rm[r.id]) r.measured = true; });
    } catch (e) {}

    // 数据说明 / 过滤计数：根据「实测」状态动态生成，避免硬编码与导入状态不符
    const measN = data.filter(r => r.measured).length;
    const planN = data.length - measN;
    const totalKm = Math.round(data.reduce((s, r) => s + (r.dist_km || 0), 0));
    const measKm = Math.round(data.filter(r => r.measured).reduce((s, r) => s + (r.dist_km || 0), 0));

    // 动态 chrome（数据说明 + 过滤计数）随语言切换重渲染
    function refreshChrome(){
      const noteEl = document.getElementById('dataNote');
      if (noteEl) {
        if (measN === 0) {
          noteEl.innerHTML = t('sec.note.all')
            .replace('{n}', data.length)
            .replace('{km}', totalKm.toLocaleString('en-US'));
        } else {
          const planKm = totalKm - measKm;
          noteEl.innerHTML = t('sec.note.part')
            .replace('{m}', measN)
            .replace('{mk}', measKm.toLocaleString('en-US'))
            .replace('{p}', planN)
            .replace('{pk}', planKm.toLocaleString('en-US'));
        }
      }
      const fMeas = document.getElementById('fMeas');
      const fPlan = document.getElementById('fPlan');
      if (fMeas) fMeas.textContent = t('sec.filter.meas') + ' ' + measN;
      if (fPlan) fPlan.textContent = t('sec.filter.plan') + ' ' + planN;
    }
    const track = document.getElementById('track');
    const dotsEl = document.getElementById('cfDots');
    let filter='all';
    let view = data.slice();
    let active = 0;

    function fmt(n){ return n==null?'—':n.toLocaleString('en-US'); }
    function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
    // 静态种子数据里 name 常内嵌海拔(如「垭口 6120m」)，与 ele 重复显示；
    // 渲染前剥离尾随海拔，避免「6120m6120m」「BC South 25800m」类重复。
    function cleanPassName(name, ele){
      let s = String(name||'').trim();
      if (ele != null) s = s.replace(/\s*\d{3,4}(?:\.\d+)?\s*m?\s*$/i, '').trim();
      return s || (ele != null ? '垭口' : '未命名');
    }
    function passesHTML(o){
      // 优先用真实 GPX 垭口（按路段归属），否则回退静态种子数据
      const dyn = (regionPasses && regionPasses[o.id] && regionPasses[o.id].length)
        ? regionPasses[o.id] : (o.passes || []);
      if(!dyn.length) return '<span class="pchip" style="opacity:.6">暂无高垭口</span>';
      // GPX 可能含重复标注点，按名称去重
      const seen = {};
      const list = dyn.filter(p=>{ const k=(p.name||'').trim().toLowerCase(); if(seen[k]) return false; seen[k]=1; return true; });
      return list.map(p=>`<span class="pchip">${esc(cleanPassName(p.name, p.ele))} ${p.ele!=null?`<b>${p.ele}m</b>`:''}</span>`).join('');
    }

    function cardHTML(o,i){
      const rc=o.color, rb=o.cborder;
      const status = o.measured ? '<span class="cfc-status meas">'+t('sec.badge.meas')+'</span>' : '<span class="cfc-status plan">'+t('sec.badge.plan')+'</span>';
      return `<div class="cfc" data-i="${i}" style="--rc:${rc};--rb:${rb}">
        <div class="cfc-img">
          <img loading="lazy" src="${o.index}" alt="${esc(o.zh)} 区域地图" width="300" height="230">
          <span class="cfc-num">${String(o.num).padStart(2,'0')}</span>
          ${status}
          <button class="cfc-view" data-i="${i}">${t('sec.view')}</button>
        </div>
      </div>`;
    }

    // 渲染全部卡片（13 段），图片仍用 loading=lazy 延迟加载以兼顾首屏性能；
    // 不再做 ±2 虚拟化窗口，避免「看起来只有 3 段」的错觉（实为 coverflow 只缓存可见±2）。
    function render(){
      const n = view.length;
      track.innerHTML = view.map((o,i)=>cardHTML(o,i)).join('');
      Array.from(track.children).forEach((c, i) => {
        c.dataset.realIdx = i;
      });
      dotsEl.innerHTML = view.map((o,i)=>`<button class="cf-dot${i===active?' active':''}" data-i="${i}" style="--rc:${o.color};--rb:${o.cborder}" aria-label="${esc(o.zh)}"></button>`).join('');
      layout();
    }

    function layout(){
      const cards = track.children;
      const W = window.innerWidth;
      const spread = W<760?120:200;
      const zDepth = W<760?60:130;
      const rot = 34;
      for(let i=0;i<cards.length;i++){
        const c=cards[i];
        const realIdx = +c.dataset.realIdx;   // 虚拟化后的真实索引
        const off=realIdx-active; const a=Math.abs(off);
        const tx=off*spread, tz=-a*zDepth, ry=off*-rot;
        let scale=1-a*0.17; if(scale<0.42)scale=0.42;
        const op=a>3?0:1-a*0.17;
        c.style.transform=`translate(-50%,-50%) translateX(${tx}px) translateZ(${tz}px) rotateY(${ry}deg) scale(${scale})`;
        c.style.opacity=op; c.style.zIndex=100-a*10;
        c.style.pointerEvents=a>3?'none':'auto';
        c.classList.toggle('is-active',off===0);
      }
      [...dotsEl.children].forEach((d,i)=>d.classList.toggle('active',i===active));
    }

    function setActive(i){
      i=Math.max(0,Math.min(view.length-1,i));
      if(i===active)return;
      active=i; layout();
    }

    // 点击切换（不再跟随鼠标滑动）
    // dots
    dotsEl.addEventListener('click',e=>{
      const d=e.target.closest('.cf-dot'); if(!d)return; setActive(+d.dataset.i);
    });
    // arrows
    document.getElementById('cfPrev').addEventListener('click',()=>setActive(active-1));
    document.getElementById('cfNext').addEventListener('click',()=>setActive(active+1));
    // keyboard
    document.addEventListener('keydown',e=>{
      if(detailOpen){ if(e.key==='Escape')closeDetail(); return; }
      if(lbOpen){ if(e.key==='Escape')lb.classList.remove('open'); return; }
      if(e.key==='ArrowLeft')setActive(active-1);
      if(e.key==='ArrowRight')setActive(active+1);
    });
    window.addEventListener('resize',layout);

    // filter
    document.getElementById('filter').addEventListener('click',e=>{
      const b=e.target.closest('button'); if(!b)return;
      document.querySelectorAll('#filter button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      filter=b.dataset.f;
      view = filter==='all'?data.slice():data.filter(o=>filter==='meas'?o.measured:!o.measured);
      active=0; render();
    });

    // detail panel
    const detail=document.getElementById('detail');
    let detailOpen=false;
    function openDetail(i){
      const o=view[i]; if(!o)return;
      detail.style.setProperty('--rc',o.color);
      detail.style.setProperty('--rb',o.cborder);
      detail.querySelector('.d-num').textContent=String(o.num).padStart(2,'0');
      detail.querySelector('.d-zh').textContent=o.zh;
      detail.querySelector('.d-en').textContent=o.en;
      const st=detail.querySelector('.d-status');
      st.textContent=t(o.measured?'sec.status.meas':'sec.status.plan');
      st.className='d-status '+(o.measured?'meas':'plan');
      const img=detail.querySelector('.d-img'); img.src=o.detail; img.alt=o.zh+' 区域地图';
      const dv=detail.querySelector('.d-dist');
      dv.innerHTML=`${fmt(o.dist_km)}<small>km${o.measured?'':t('sec.ref')}</small>`;
      dv.classList.toggle('ref', !o.measured);
      detail.querySelector('.d-asc').textContent=fmt(o.asc_m)+' m';
      detail.querySelector('.d-desc').textContent=fmt(o.desc_m)+' m';
      detail.querySelector('.d-max').textContent=fmt(o.max_ele)+' m';
      detail.querySelector('.d-min').textContent=fmt(o.min_ele)+' m';
      detail.querySelector('.d-passes').innerHTML=passesHTML(o);
      const _lang = window.GHTI18N.getLang();
      detail.querySelector('.d-legend').textContent = _lang === 'en' ? (o.legend_en || o.legend) : o.legend;
      detail.querySelector('.d-scenery').textContent = _lang === 'en' ? (o.scenery_en || o.scenery) : o.scenery;
      detail.classList.add('open'); detailOpen=true;
      document.body.style.overflow='hidden';
    }
    function closeDetail(){detail.classList.remove('open');detailOpen=false;document.body.style.overflow='';}
    detail.querySelector('.d-close').addEventListener('click',closeDetail);
    detail.querySelector('.d-backdrop').addEventListener('click',closeDetail);

    // click card / view button
    track.addEventListener('click',e=>{
      const btn=e.target.closest('.cfc-view');
      if(btn){ e.stopPropagation(); openDetail(+btn.dataset.i); return; }
      const card=e.target.closest('.cfc');
      if(card){ const i=+card.dataset.realIdx; if(i===active)openDetail(i); else setActive(i); }
    });
    // image zoom from detail
    detail.querySelector('.d-img').addEventListener('click',()=>{
      openRegion(detail.querySelector('.d-img').src, detail.querySelector('.d-zh').textContent);
    });

    // image-only lightbox
    const lb=document.getElementById('lb'),lbCap=document.getElementById('lbCap'),lbImgs=document.getElementById('lbImgs');
    let lbOpen=false;
    function openRegion(src,name){lbCap.textContent='🗺️ '+name;lbImgs.innerHTML=`<img src="${src}" alt="" width="820" loading="lazy">`;lb.classList.add('open');lbOpen=true;}
    document.getElementById('lbClose').addEventListener('click',()=>{lb.classList.remove('open');lbOpen=false;});
    lb.addEventListener('click',e=>{if(e.target===lb){lb.classList.remove('open');lbOpen=false;}});

    render();
    refreshChrome();

    // 语言切换时：刷新动态 chrome、重建卡片（覆盖徽标/按钮文案）、重开详情
    window.onLangChange = function(){
      refreshChrome();
      render();
      if (detailOpen) openDetail(active);
    };
  })();
  </script>
</body>
</html>
