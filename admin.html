<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 后端地址：EdgeOne 边缘函数与静态站同域运行，留空则自动使用当前域名 -->
<meta name="ght-api" content="">
<title>GHT 后台管理 · Admin</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="nepal-provinces.js"></script>
<script src="sections-data.js"></script>
<link rel="stylesheet" href="styles.css" />
<style>
  body.admin-page { background: var(--bg, #0a0d12); }
  .admin-top{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px;
    padding:12px 22px;background:rgba(10,13,18,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border,rgba(255,255,255,.09))}
  .admin-top .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px}
  .admin-top .badge{font-size:11px;font-weight:700;letter-spacing:1px;color:#ffce6b;
    background:rgba(255,206,107,.12);border:1px solid rgba(255,206,107,.35);border-radius:7px;padding:3px 9px}
  .admin-top .spacer{flex:1}
  .admin-top a,.admin-top button{font-size:12.5px;color:var(--text,#e6edf3);background:var(--panel-2,rgba(255,255,255,.055));
    border:1px solid var(--border,rgba(255,255,255,.09));border-radius:8px;padding:7px 13px;text-decoration:none;cursor:pointer;transition:.18s}
  .admin-top a:hover,.admin-top button:hover{color:#fff;border-color:rgba(255,255,255,.22)}

  .admin-main{max-width:920px;margin:0 auto;padding:26px 22px 60px}
  .admin-sec{background:var(--panel,rgba(255,255,255,.035));border:1px solid var(--border,rgba(255,255,255,.09));
    border-radius:14px;padding:18px 20px;margin-bottom:20px}
  .admin-sec h2{font-size:17px;font-weight:800;margin:0 0 4px;display:flex;align-items:center;gap:9px}
  .admin-sec .en{font-size:11px;font-weight:600;color:var(--text-faint,#5b6675);letter-spacing:2px}
  .admin-sec p.hint{color:var(--text-dim,#8b98a8);font-size:12.5px;margin:6px 0 14px;line-height:1.6}

  /* 日志录入 */
  .composer-box{background:var(--panel-2,rgba(255,255,255,.055));border:1px solid var(--border,rgba(255,255,255,.09));border-radius:12px;padding:14px 16px}
  .composer-box label{display:block;font-size:11px;color:var(--text-dim,#8b98a8);margin-bottom:6px}
  .composer-box textarea{width:100%;background:var(--bg-soft,#0f141d);border:1px solid var(--border,rgba(255,255,255,.09));
    border-radius:8px;color:var(--text,#e6edf3);padding:9px 11px;font-family:inherit;font-size:13px;box-sizing:border-box;resize:vertical;min-height:70px;line-height:1.6}
  .composer-box .btn-pub{margin-top:10px;width:100%;padding:10px;background:var(--accent,#4f9dff);color:#fff;
    border:none;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.18s}
  .composer-box .btn-pub:hover{filter:brightness(1.12)}
  .composer-box input.j-pwd{width:100%;background:var(--bg-soft,#0f141d);border:1px solid var(--border,rgba(255,255,255,.09));
    border-radius:8px;color:var(--text,#e6edf3);padding:9px 11px;font-family:inherit;font-size:13px;box-sizing:border-box;margin-bottom:8px}
  .j-pwd-err{color:var(--orange,#ffa94d);font-size:12px;margin-top:8px}

  /* 配置表单 */
  .cfg-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .cfg-row label{width:130px;font-size:13px;color:var(--text-dim,#8b98a8);flex:none}
  .cfg-row input,.cfg-row select{flex:1;background:var(--bg-soft,#0f141d);border:1px solid var(--border,rgba(255,255,255,.09));
    border-radius:8px;color:var(--text,#e6edf3);padding:9px 11px;font-family:inherit;font-size:13px;box-sizing:border-box}
  .cfg-save{margin-top:6px;padding:10px 18px;background:var(--accent,#4f9dff);color:#fff;border:none;border-radius:8px;font-size:13.5px;font-weight:600;cursor:pointer}
  .cfg-save:hover{filter:brightness(1.12)}
  .cfg-msg{font-size:12.5px;margin-left:12px}

  /* 轨迹上传提示卡（复用 app.js 数据弹窗之外，这里给个引导） */
  .track-card{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .track-card .btn-go{padding:11px 20px;background:var(--accent,#4f9dff);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer}
  .track-card .btn-go:hover{filter:brightness(1.12)}
  .track-note{font-size:12px;color:var(--text-dim,#8b98a8);margin-top:8px;line-height:1.6}
</style>
</head>

<body class="admin-page">

  <!-- 复用 app.js 的轨迹处理管线需要一个地图容器；置为屏幕外 1px，不影响后台使用 -->
  <div id="map" style="position:absolute;width:1px;height:1px;left:-9999px;top:-9999px;overflow:hidden;opacity:0;pointer-events:none;"></div>

  <header class="admin-top">
    <div class="brand">🏔️ GHT <span class="badge">后台 ADMIN</span></div>
    <span class="spacer"></span>
    <a href="index.html" target="_blank" rel="noopener">查看前台 ↗</a>
    <a href="journal.html" target="_blank" rel="noopener">日志页 ↗</a>
    <button id="adminLogout" type="button">退出登录</button>
  </header>

  <main class="admin-main">

    <!-- 1. 日志录入 -->
    <section class="admin-sec">
      <h2>📝 远征日志录入 <span class="en">JOURNAL</span></h2>
      <p class="hint">在此发布沿途随笔，发布即同步到云端共享包，公众站与他人设备即时可见。只发文字、不传照片（山里信号不稳）。</p>
      <div id="composer"></div>
      <div class="feed" id="feed" style="margin-top:16px"></div>
    </section>

    <!-- 2. 轨迹上传 -->
    <section class="admin-sec">
      <h2>📍 轨迹上传 <span class="en">TRACKS</span></h2>
      <p class="hint">上传 GPX 预设轨迹 / 实际徒步轨迹。处理管线与前台完全一致（抽稀、垭口识别、路段计算），上传即发布到云端。</p>
      <div class="track-card">
        <button class="btn-go" id="openTrackModal" type="button">打开轨迹管理</button>
        <span class="track-note">需先解锁（输入主人密码）。上传后公众地图与海拔剖面自动更新。</span>
      </div>
    </section>

    <!-- 3. 站点配置 -->
    <section class="admin-sec">
      <h2>⚙️ 站点配置 <span class="en">CONFIG</span></h2>
      <p class="hint">出发日期、远征名称、默认语言。保存后全设备生效。</p>
      <div class="cfg-row">
        <label>远征名称</label>
        <input type="text" id="cfgName" placeholder="如 GHT 2026">
      </div>
      <div class="cfg-row">
        <label>出发日期</label>
        <input type="date" id="cfgStart">
      </div>
      <div class="cfg-row">
        <label>默认语言</label>
        <select id="cfgLang">
          <option value="zh-CN">中文</option>
          <option value="en">English</option>
        </select>
      </div>
      <div>
        <button class="cfg-save" id="cfgSave" type="button">保存配置</button>
        <span class="cfg-msg" id="cfgMsg"></span>
      </div>
    </section>

  </main>

  <!-- ── DATA MANAGEMENT MODAL（从 index.html 迁入，轨迹上传使用 app.js 管线）── -->
  <div class="modal-overlay" id="dataModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="数据管理">
      <div class="modal-head">
        <span id="dmTitle">数据管理</span>
        <button class="modal-close" onclick="closeDataModal()" aria-label="关闭">✕</button>
      </div>
      <div class="modal-body">
        <div class="pwd-gate" id="pwdGate">
          <p class="pwd-hint" id="dmPwdHint">请输入主人密码以管理轨迹数据</p>
          <input type="password" id="pwdInput" class="form-input" placeholder="密码" autocomplete="off" onkeydown="if(event.key==='Enter')unlockData()">
          <button class="btn primary" id="dmUnlock" onclick="unlockData()">解锁</button>
          <div class="pwd-err" id="dmPwdErr" hidden>密码错误</div>
        </div>
        <div class="upload-area" id="uploadArea" hidden></div>
      </div>
    </div>
  </div>

  <script src="ght-region-map.js?v=2"></script>
  <script src="app.js?v=2"></script>
  <script>
  /* ============================================================
     后台管理逻辑（日志录入 + 配置）。轨迹上传复用 app.js 弹窗。
     ============================================================ */
  (function () {
    if (typeof window.API === 'undefined') {
      document.getElementById('composer').innerHTML = '<div class="composer-box">⚠️ 后端脚本未加载，请检查 app.js 是否引入。</div>';
      return;
    }
    const NEPAL_OFFSET_MS = (5 * 60 + 45) * 60 * 1000;
    const TOKEN_KEY = 'ght_token';
    function getOwnerToken() { try { return localStorage.getItem(TOKEN_KEY) || ''; } catch (e) { return ''; } }
    function setOwnerToken(t) { try { if (t) localStorage.setItem(TOKEN_KEY, t); else localStorage.removeItem(TOKEN_KEY); } catch (e) {} }
    function apiBase() { const m = document.querySelector('meta[name="ght-api"]'); const v = (m && m.getAttribute('content') || '').trim().replace(/\/+$/, ''); return v || location.origin; }
    function hasBackend() { return true; }
    function authHeader() { const t = getOwnerToken(); return t ? { 'Authorization': 'Bearer ' + t } : {}; }

    // ── 共享包读写（与 journal.html 同构）──
    let sharedCache = null;
    let localDeletedIds = new Set();
    async function getShare() {
      if (!hasBackend()) return null;
      try {
        const res = await fetch(apiBase() + '/api/share', { method: 'GET' });
        let d = null; try { d = await res.json(); } catch (e) {}
        if (d && d.ok && d.data) return d.data;
        return null;
      } catch (e) { return null; }
    }
    async function putShare(bundle) {
      if (!hasBackend()) return;
      try { await fetch(apiBase() + '/api/share', { method: 'PUT', headers: Object.assign({ 'Content-Type': 'application/json' }, authHeader()), body: JSON.stringify(bundle) }); }
      catch (e) { console.warn('[admin] 共享推送失败', e); }
    }
    function pushJournalShare() {
      if (!getOwnerToken()) return;
      const deleted = new Set([...(sharedCache && sharedCache.deletedIds || []), ...localDeletedIds]);
      const journal = mergeJournal(logEntries, sharedCache ? sharedCache.journal : null, deleted);
      const bundle = (sharedCache && typeof sharedCache === 'object') ? JSON.parse(JSON.stringify(sharedCache)) : {};
      bundle.journal = journal;
      bundle.deletedIds = [...deleted];
      delete bundle.clearedAt;
      sharedCache = bundle;
      putShare(bundle);
    }
    async function loadSharedJournal() {
      if (!hasBackend()) return;
      const b = await getShare();
      if (b) {
        sharedCache = b;
        const deleted = new Set(b.deletedIds || []);
        logEntries = mergeJournal(logEntries, b.journal || [], deleted);
        renderFeed('all');
      } else if (getOwnerToken() && logEntries.length) {
        pushJournalShare();
      }
    }

    function genId() { return 'le_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
    function mergeJournal(local, remote, deletedIds) {
      const deleted = new Set(deletedIds || []);
      const m = new Map();
      (remote || []).forEach(e => { if (e && e.id && !deleted.has(e.id)) m.set(e.id, e); });
      (local || []).forEach(e => {
        if (!e || deleted.has(e.id)) return;
        if (!e.id) e.id = genId();
        if (!e.updatedAt) e.updatedAt = 0;
        const cur = m.get(e.id);
        if (!cur || e.updatedAt >= cur.updatedAt) m.set(e.id, e);
      });
      return Array.from(m.values()).sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    }

    function loadLogLocal() {
      try { const raw = JSON.parse(localStorage.getItem('ght_log') || '[]'); if (Array.isArray(raw)) logEntries = raw; } catch (e) {}
      logEntries.forEach((e, i) => { if (!e.id) e.id = 'le_' + Date.now().toString(36) + '_' + i; });
      logEntries.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    }
    function saveLogLocal() { try { localStorage.setItem('ght_log', JSON.stringify(logEntries)); } catch (e) {} }

    // ── 登录（复用 app.js 的 /api/login）──
    async function adminLogin(pwd) {
      if (hasBackend()) {
        try {
          const res = await fetch(apiBase() + '/api/login?_t=' + Date.now(), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pwd }) });
          let data = null; try { data = await res.json(); } catch (e) {}
          if (data && data.ok && data.token) return { ok: true, token: data.token };
          // 显示服务器真实错误（优先 message，其次 error 字段，避免一律显示"密码错误"掩盖真问题）
          const realMsg = (data && (data.message || data.error)) ? (data.message || data.error) : ('HTTP ' + res.status + ' 登录失败');
          return { ok: false, msg: realMsg };
        } catch (e) { return { ok: false, msg: '无法连接服务器（后端未启动？）' }; }
      }
      return { ok: false, msg: '未配置后端地址' };
    }

    // ── 渲染 ──
    let logEntries = [];
    function escapeHtml(s) { return (s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
    function fmtNepalDate(d) {
      const dt = (d instanceof Date) ? d : new Date(d);
      if (isNaN(dt.getTime())) return null;
      const nepal = new Date(dt.getTime() + NEPAL_OFFSET_MS);
      const y = nepal.getUTCFullYear(), mo = String(nepal.getUTCMonth() + 1).padStart(2, '0'), da = String(nepal.getUTCDate()).padStart(2, '0');
      return y + '-' + mo + '-' + da;
    }
    function entryCard(e) {
      const isGps = !!e.dailyStats;
      const owner = !!getOwnerToken();
      const delBtn = owner ? '<button class="del-btn" type="button" data-id="' + escapeHtml(e.id || '') + '" title="删除" style="background:var(--bg-soft);border:1px solid var(--border);color:var(--text-dim);border-radius:7px;width:26px;height:26px;cursor:pointer;margin-left:8px;">🗑</button>' : '';
      const dayBadge = e.dayNum ? '<span style="font-size:11px;color:var(--text-faint);background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;padding:2px 8px;">Day ' + e.dayNum + '</span>' : '';
      return '<div class="card" style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:10px;">'
        + '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;">'
        + '<span style="font-size:12.5px;color:var(--text-dim);font-weight:600;">' + escapeHtml(e.date || '—') + '</span>' + dayBadge
        + '<span style="margin-left:auto;">' + (isGps ? '<span style="font-size:11px;color:var(--green);background:rgba(52,208,88,.1);border:1px solid rgba(52,208,88,.3);border-radius:7px;padding:3px 9px;font-weight:600;">📡 自动记录</span>' : '') + delBtn + '</span>'
        + '</div>'
        + '<div style="font-size:13.5px;color:var(--text);line-height:1.7;white-space:pre-wrap;word-break:break-word;">' + escapeHtml(e.text || '') + '</div>'
        + '</div>';
    }
    function renderFeed(filter) {
      const feed = document.getElementById('feed');
      if (!feed) return;
      const shown = logEntries.filter(e => filter === 'all' || (filter === 'gps' ? !!e.dailyStats : !e.dailyStats));
      feed.innerHTML = shown.length ? shown.map(entryCard).join('') : '<div style="text-align:center;color:var(--text-dim);padding:30px;font-size:13px;">暂无日志</div>';
      feed.querySelectorAll('.del-btn').forEach(b => b.addEventListener('click', () => confirmDelete(b.dataset.id)));
    }
    function renderComposer() {
      const box = document.getElementById('composer');
      if (!box) return;
      if (!getOwnerToken()) {
        box.innerHTML = '<div class="composer-box">'
          + '<label>解锁后可发布日志</label>'
          + '<input type="password" id="jPwd" class="j-pwd" placeholder="主人密码" autocomplete="off" onkeydown="if(event.key===\'Enter\')adminUnlock()">'
          + '<button class="btn-pub" id="jUnlock" onclick="adminUnlock()">解锁</button>'
          + '<div class="j-pwd-err" id="jPwdErr" hidden></div></div>';
        const ub = document.getElementById('jUnlock'); if (ub) ub.addEventListener('click', adminUnlock);
        return;
      }
      box.innerHTML = '<div class="composer-box">'
        + '<textarea id="jText" rows="3" placeholder="写下今天的故事…"></textarea>'
        + '<button class="btn-pub" id="jPub">发布日志</button>'
        + '<button class="btn-pub" id="jRepublish" style="margin-top:8px;background:#3a7;" onclick="adminRepublish()">🔄 重新发布共享</button>'
        + '</div>';
      const btn = document.getElementById('jPub'); if (btn) btn.addEventListener('click', addLogEntry);
      const rb = document.getElementById('jRepublish'); if (rb) rb.addEventListener('click', adminRepublish);
    }
    window.adminUnlock = async function () {
      const pi = document.getElementById('jPwd'); if (!pi) return;
      const r = await adminLogin(pi.value);
      const err = document.getElementById('jPwdErr');
      if (r.ok) { setOwnerToken(r.token); renderComposer(); renderFeed('all'); }
      else if (err) { err.hidden = false; err.textContent = r.msg; }
    };
    window.addLogEntry = function () {
      if (!getOwnerToken()) { renderComposer(); return; }
      const ta = document.getElementById('jText'); const text = (ta ? ta.value : '').trim();
      if (!text) return;
      const entry = { id: genId(), date: fmtNepalDate(new Date()), text, updatedAt: Date.now() };
      logEntries.push(entry);
      logEntries.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
      saveLogLocal(); pushJournalShare();
      if (ta) ta.value = '';
      renderFeed('all');
    };
    window.adminRepublish = async function () {
      if (!getOwnerToken()) { renderComposer(); return; }
      const fresh = await getShare(); if (fresh) sharedCache = fresh;
      pushJournalShare();
      alert('✅ 已重新发布到云端');
    };
    let _delId = null;
    window.confirmDelete = function (id) {
      if (!getOwnerToken()) { renderComposer(); return; }
      _delId = id;
      if (confirm('确定删除这条日志？此操作会同步到云端（他人设备不再显示）。')) doDelete();
    };
    async function doDelete() {
      if (!_delId) return;
      localDeletedIds.add(_delId);
      logEntries = logEntries.filter(e => e.id !== _delId);
      saveLogLocal(); pushJournalShare();
      _delId = null;
      renderFeed('all');
    }

    // ── 配置 ──
    async function loadConfig() {
      try {
        const r = await API.getConfig();
        if (r && r.ok && r.data) {
          const c = r.data;
          if (c.expeditionName) document.getElementById('cfgName').value = c.expeditionName;
          if (c.itineraryStartDate) document.getElementById('cfgStart').value = c.itineraryStartDate;
          if (c.language) document.getElementById('cfgLang').value = c.language;
        }
      } catch (e) {}
    }
    async function saveConfig() {
      const name = document.getElementById('cfgName').value.trim();
      const start = document.getElementById('cfgStart').value;
      const lang = document.getElementById('cfgLang').value;
      const msg = document.getElementById('cfgMsg');
      const r = await API.putConfig({ expeditionName: name, itineraryStartDate: start, language: lang });
      if (r && (r.ok || r.status === 200)) msg.textContent = '✅ 已保存';
      else msg.textContent = '❌ 保存失败（需先解锁轨迹管理）';
      setTimeout(() => { msg.textContent = ''; }, 2500);
    }

    // ── 绑定 ──
    document.getElementById('openTrackModal').addEventListener('click', () => { if (typeof openDataModal === 'function') openDataModal(); });
    document.getElementById('cfgSave').addEventListener('click', saveConfig);
    document.getElementById('adminLogout').addEventListener('click', () => { setOwnerToken(''); location.reload(); });

    // ── 启动 ──
    loadLogLocal();
    loadSharedJournal();
    loadConfig();
    renderComposer();
    renderFeed('all');
  })();
  </script>
</body>
</html>
