# GHT Trek — Cloudflare Pages 配置
#
# 用途：
#   1) 本地开发：  wrangler pages dev . --kv GHT_KV=<namespace-id>
#   2) 部署到生产（dashboard 连接 GitHub 时，绑定请在控制台设置，见下）
#
# 生产环境必须做的事（Cloudflare 控制台 → ght-trek Pages 项目）：
#   · 设置 → 函数 → KV 命名空间绑定：变量名 GHT_KV，选你创建的命名空间
#   · 设置 → 环境变量（生产）：ADMIN_PWD、SECRET
#
# KV 命名空间：可复用已有的 ght-kv，也可新建一个。控制台 → 存储和数据库 → KV，复制命名空间 ID 填到下面。
# 重要：在 Pages 项目里绑定 KV 时，变量名必须叫 GHT_KV（functions/api/[[route]].js 用 env.GHT_KV 读取）。

name = "ght-trek"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"

# 生产部署（GitHub 连接或 wrangler 你的 wrangler pages deploy）会读取本绑定。
# id 必须是 ght-kv 命名空间在 Cloudflare 控制台的真实 ID（已在 2026-07-23 填入）。
[[kv_namespaces]]
binding = "GHT_KV"
id = "b89d4ef4a38f44a2ac089c7425e32b3a"
